# ==========================================================================
# UC-M06: Describe chart semantics
# ==========================================================================

- id: CQ-M15
  source_use_case: UC-M06
  natural_language: "What type of chart is a given visualization (bar, line, scatter, etc.)?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      chartType: enews:LineChart
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?chartType WHERE {
      enews:media_001 enews:chartType ?chartType .
    }
  expected_result: non_empty
  required_properties: [chartType]
  requires_reasoning: false

- id: CQ-M16
  source_use_case: UC-M06
  natural_language: "What are the axis labels and units for a given chart?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      xAxisLabel: "Year"
      xAxisUnit: null
      yAxisLabel: "Net Imports"
      yAxisUnit: "TWh"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?xLabel ?xUnit ?yLabel ?yUnit WHERE {
      enews:media_001 enews:hasXAxis ?xAxis ;
                       enews:hasYAxis ?yAxis .
      ?xAxis enews:axisLabel ?xLabel .
      OPTIONAL { ?xAxis enews:axisUnit ?xUnit . }
      ?yAxis enews:axisLabel ?yLabel .
      OPTIONAL { ?yAxis enews:axisUnit ?yUnit . }
    }
  expected_result: non_empty
  required_classes: [ChartAxis]
  required_properties: [hasXAxis, hasYAxis, axisLabel, axisUnit]
  requires_reasoning: false

- id: CQ-M17
  source_use_case: UC-M06
  natural_language: "What time period does a given chart cover?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      startDate: "2015-01-01"
      endDate: "2026-03-01"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?start ?end WHERE {
      enews:media_001 enews:hasTemporalCoverage ?period .
      ?period enews:startDate ?start ;
              enews:endDate ?end .
    }
  expected_result: non_empty
  required_properties: [hasTemporalCoverage, startDate, endDate]
  requires_reasoning: false

- id: CQ-M18
  source_use_case: UC-M06
  natural_language: "What geographic region does a given chart cover?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      region: enews:region_british_columbia
      label: "British Columbia"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX dcterms: <http://purl.org/dc/terms/>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?region ?label WHERE {
      enews:media_001 dcterms:spatial ?region .
      ?region rdfs:label ?label .
    }
  expected_result: non_empty
  requires_reasoning: false

- id: CQ-M19
  source_use_case: UC-M06
  natural_language: "What data series are plotted in a given chart?"
  type: enumerative
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      series: enews:series_001
      label: "BC Net Imports"
      unit: "TWh"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?series ?label ?unit WHERE {
      enews:media_001 enews:hasSeries ?series .
      ?series rdfs:label ?label .
      OPTIONAL { ?series enews:seriesUnit ?unit . }
    }
  expected_result: non_empty
  required_classes: [ChartSeries]
  required_properties: [hasSeries]
  requires_reasoning: false

- id: CQ-M20
  source_use_case: UC-M06
  natural_language: "What is the title or caption of a given chart?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      title: "BC Hydro Net Imports 2015-2026"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX dcterms: <http://purl.org/dc/terms/>
    SELECT ?title WHERE {
      enews:media_001 dcterms:title ?title .
    }
  expected_result: non_empty
  requires_reasoning: false

- id: CQ-M21
  source_use_case: UC-M06
  natural_language: "What key data points or trends does a chart highlight?"
  type: relational
  priority: should_have
  sample_answer:
    - chart: enews:media_001
      finding: "First time all three major hydro provinces were net importers simultaneously"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?finding WHERE {
      enews:media_001 enews:keyFinding ?finding .
    }
  expected_result: non_empty
  required_properties: [keyFinding]
  requires_reasoning: false
  notes: "Key findings are extracted by vision pipeline. They represent the most salient takeaway from the chart — the 'so what' a human would highlight."
