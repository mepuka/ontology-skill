# Energy Media Ontology — Competency Questions
# NOTE: Media domain is now merged into energy-news (enews namespace).

# ==========================================================================
# UC-M01: Classify media in expert posts
# ==========================================================================

# --- Must Have ---

- id: CQ-M01
  source_use_case: UC-M01
  natural_language: "What media types exist in the ontology?"
  type: enumerative
  priority: must_have
  sample_answer:
    - type: enews:Chart
      label: "Chart"
    - type: enews:DocumentExcerpt
      label: "Document Excerpt"
    - type: enews:Photo
      label: "Photo"
    - type: enews:Infographic
      label: "Infographic"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?type ?label WHERE {
      ?type rdfs:subClassOf enews:MediaAttachment ;
            rdfs:label ?label .
    }
  expected_result: non_empty
  required_classes: [MediaAttachment]
  requires_reasoning: false

- id: CQ-M02
  source_use_case: UC-M01
  natural_language: "What media attachments are embedded in a given post?"
  type: relational
  priority: must_have
  sample_answer:
    - post: enews:post_hydro_01
      media: enews:media_001
      mediaType: enews:Chart
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?media ?mediaType WHERE {
      enews:post_hydro_01 enews:hasMedia ?media .
      ?media a ?mediaType .
      ?mediaType rdfs:subClassOf enews:MediaAttachment .
    }
  expected_result: non_empty
  required_classes: [MediaAttachment]
  required_properties: [hasMedia]
  requires_reasoning: false

- id: CQ-M03
  source_use_case: UC-M01
  natural_language: "What chart types exist in the ontology?"
  type: enumerative
  priority: must_have
  sample_answer:
    - chartType: enews:BarChart
      label: "Bar Chart"
    - chartType: enews:LineChart
      label: "Line Chart"
    - chartType: enews:Heatmap
      label: "Heatmap"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?chartType ?label WHERE {
      ?chartType skos:inScheme enews:ChartTypeScheme ;
                 rdfs:label ?label .
    }
  expected_result: non_empty
  required_classes: []
  requires_reasoning: false

# ==========================================================================
# UC-M02: Trace chart attribution across layers
# ==========================================================================

- id: CQ-M04
  source_use_case: UC-M02
  natural_language: "Who posted a given chart (image source)?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      author: enews:author_blakeshaffer
      handle: "blakeshaffer.bsky.social"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX prov: <http://www.w3.org/ns/prov#>
    SELECT ?author ?handle WHERE {
      enews:media_001 prov:wasAttributedTo ?author .
      ?author enews:handle ?handle .
    }
  expected_result: non_empty
  required_properties: [prov:wasAttributedTo]
  requires_reasoning: false

- id: CQ-M05
  source_use_case: UC-M02
  natural_language: "What publication or report does a chart originally appear in (content source)?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_002
      source: enews:article_bchydro_report
      title: "BC Hydro Annual Report 2025"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX dcterms: <http://purl.org/dc/terms/>
    SELECT ?source ?title WHERE {
      enews:media_002 dcterms:source ?source .
      ?source dcterms:title ?title .
    }
  expected_result: non_empty
  required_properties: [dcterms:source]
  requires_reasoning: false

- id: CQ-M06
  source_use_case: UC-M02
  natural_language: "What underlying dataset does a chart's data come from (data source)?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_001
      dataset: enews:dataset_bchydro_generation
      provider: enews:provider_bchydro
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX prov: <http://www.w3.org/ns/prov#>
    SELECT ?dataset ?provider WHERE {
      enews:media_001 prov:wasDerivedFrom ?dataset .
      ?dataset enews:providedBy ?provider .
    }
  expected_result: non_empty
  required_properties: [prov:wasDerivedFrom, providedBy]
  requires_reasoning: false

- id: CQ-M07
  source_use_case: UC-M02
  natural_language: "What are all three attribution layers for a given chart?"
  type: relational
  priority: must_have
  sample_answer:
    - chart: enews:media_002
      imageSource: enews:author_blakeshaffer
      contentSource: enews:article_bchydro_report
      dataSource: enews:dataset_doe_generation
  derivation_method: composite
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX prov: <http://www.w3.org/ns/prov#>
    PREFIX dcterms: <http://purl.org/dc/terms/>
    SELECT ?imageSource ?contentSource ?dataSource WHERE {
      enews:media_002 prov:wasAttributedTo ?imageSource .
      OPTIONAL { enews:media_002 dcterms:source ?contentSource . }
      OPTIONAL { enews:media_002 prov:wasDerivedFrom ?dataSource . }
    }
  expected_result: non_empty
  requires_reasoning: false
  notes: "Not all layers are always present. An original chart by an expert may have image source + data source but no content source."

# ==========================================================================
# UC-M03: Fill alt text gaps with provenance
# ==========================================================================

- id: CQ-M08
  source_use_case: UC-M03
  natural_language: "Does a given media attachment have alt text, and what is its provenance?"
  type: relational
  priority: must_have
  sample_answer:
    - media: enews:media_001
      altText: null
      altTextProvenance: enews:AltTextAbsent
    - media: enews:media_003
      altText: "Day-ahead energy prices for 28/2/2026..."
      altTextProvenance: enews:AltTextOriginal
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?media ?altText ?provenance WHERE {
      ?media a enews:MediaAttachment .
      OPTIONAL { ?media enews:altText ?altText . }
      ?media enews:altTextProvenance ?provenance .
    }
  expected_result: non_empty
  required_properties: [altText, altTextProvenance]
  requires_reasoning: false

- id: CQ-M09
  source_use_case: UC-M03
  natural_language: "Which media attachments have no alt text (gap candidates for vision enrichment)?"
  type: enumerative
  priority: must_have
  sample_answer:
    - media: enews:media_001
      post: enews:post_hydro_01
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?media ?post WHERE {
      ?post enews:hasMedia ?media .
      ?media enews:altTextProvenance enews:AltTextAbsent .
    }
  expected_result: non_empty
  requires_reasoning: false

# ==========================================================================
# UC-M04: Assess media richness for curation
# ==========================================================================

- id: CQ-M10
  source_use_case: UC-M04
  natural_language: "How many chart images does a given post have?"
  type: quantitative
  priority: should_have
  sample_answer:
    - post: enews:post_hydro_01
      chartCount: 1
  derivation_method: aggregation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?post (COUNT(?media) AS ?chartCount) WHERE {
      ?post enews:hasMedia ?media .
      ?media a enews:Chart .
    }
    GROUP BY ?post
  expected_result: non_empty
  requires_reasoning: false

- id: CQ-M11
  source_use_case: UC-M04
  natural_language: "What distinct media types are embedded in a given post?"
  type: enumerative
  priority: should_have
  sample_answer:
    - post: enews:post_hydro_01
      mediaTypes: [enews:Chart, enews:DocumentExcerpt]
  derivation_method: aggregation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?post ?mediaType WHERE {
      ?post enews:hasMedia ?media .
      ?media a ?mediaType .
      ?mediaType rdfs:subClassOf enews:MediaAttachment .
    }
  expected_result: non_empty
  requires_reasoning: false

