# energy-intel — Imports Manifest Index (v0.3.0 release)
#
# Authored: 2026-04-27 by ontology-curator (v0.2.0 release)
# Updated:  2026-05-04 by ontology-curator (v0.3.0 release; V2 delta added)
#
# Why an index instead of a folded manifest?
# ------------------------------------------
# V0 manifest (`imports-manifest.yaml`) and V1 delta manifest
# (`imports-manifest-v1.yaml`) describe the same import graph at two
# different points in time. The V1 delta intentionally shadows V0 rows
# whose `extraction_method` changed (OEO subsets: BOT -> BOT_post_strip;
# QUDT: rejected/MIREOT -> programmatic_slice).
#
# Folding them into one file would lose the audit trail of "this row
# changed extraction method between V0 and V1 because of construct_mismatch
# remediation". Per `_shared/odk-and-imports.md § 3` the manifest is the
# canonical refresh trigger; preserving the delta as a separate file keeps
# the change auditable for the next refresh cycle.
#
# This index file points downstream consumers (scout / mapper / validator /
# curator) at the right manifest for their use case.

release: v0.3.0
release_date: "2026-05-04"
authored_by: ontology-curator
schema_version: "1.0"
prior_release: v0.2.0
prior_release_date: "2026-04-27"

manifests:

  - id: v0-baseline
    file: imports-manifest.yaml
    role: V0 baseline manifest
    authored_at: "2026-04-22"
    authored_by: ontology-scout
    commit: "36d1952"
    description: |
      V0 baseline manifest. Source-of-truth for any row not restated in
      `imports-manifest-v1.yaml`. Carries the rejected V0 entries
      (qudt-full-schema, schema-org-core, oeoex, owl-time, sosa-ssn,
      rdf-data-cube) with their rejection rationales — the V1 delta
      does not restate these, so they live only here.

  - id: v1-delta
    file: imports-manifest-v1.yaml
    role: V1 delta manifest
    authored_at: "2026-04-27"
    authored_by: ontology-scout
    description: |
      V1 delta manifest. Restates only `added` / `status_changed` /
      `rejected` entries vs V0. Three rows shadow V0:
        * oeo-technology-2.11.0 (status_changed: BOT -> BOT_post_strip)
        * oeo-carrier-2.11.0   (status_changed: BOT -> BOT_post_strip)
        * qudt-units-2.1       (status_changed: full_import -> programmatic_slice)
      Reads V0 manifest as `baseline_manifest` reference.

  - id: v2-delta
    file: imports-manifest-v2.yaml
    role: V2 delta manifest
    authored_at: "2026-05-04"
    authored_by: ontology-curator
    description: |
      V2 delta manifest. Restates only `added` / `closure_changed`
      entries vs V1+V0. Five rows added (oeo-topic-subset-2.11.0,
      ei-argument-pattern-v2, ei-narrative-role-v2, ei-oeo-topics-v2,
      ei-editorial-v2). One row closure_changed: ei-technology-seeds-v0
      retired from owl:imports (file preserved on disk per safety rule
      #4; tracked as V2-CUR-4 for v0.4.0 deprecation cycle).
      Resolution: V2 > V1 > V0 by row id.

