# ---------------------------------------------------------------------
# Refresh policy (curator audit)
# ---------------------------------------------------------------------
refresh_policy:
  default_action_on_cadence_breach: |
    On cadence elapse: curator runs `uv run runoak ... compare` against
    the upstream's latest release. Any non-trivial diff triggers a
    `robot diff` + KGCL patch + scout-loopback for re-extract + mapper
    loopback for any mappings whose subject/object source moved + full
    validator regression.
  oeo_specific:
    bfo_ro_leak_check: |
      Both OEO subsets are stripped by IRI list, NOT by namespace prefix.
      If OEO upstream introduces NEW BFO or RO IRIs in a future release,
      `scripts/build_v1_imports.py` will leak them. Curator MUST compare
      the BFO/RO IRI set in the new OEO subset against
      `imports/upper-axiom-leak-terms.txt` at every OEO refresh and extend
      the strip list accordingly.
    descendants_check: |
      V0/V1 BOT extract pulls only the parent path. OEO_00020267
      (energy-technology), OEO_00020039 (energy-carrier), and
      OEO_00000011 (energy-converting-component) all have 0 descendants
      in the subset. At next refresh, choose: (a) re-extract with TOP+BOT
      to drag descendants, OR (b) extend the seed list with concrete
      technologies (solar-pv, onshore-wind, lithium-ion-battery).
      Tracked as V1-CUR-1.
  qudt_specific:
    si_prefix_naming_lint: |
      QUDT 2.1 uses SI-prefix-as-word naming: `unit:GigaW`, not `unit:GW`;
      `unit:MegaW`, not `unit:MW`; `unit:TeraW-HR`, not `unit:TW-HR`.
      Validator V1 already corrected `tests/cq-016.sparql`. At next
      QUDT refresh, curator runs a pre-commit lint that greps for the
      bad forms (`unit:[GMTk]W(\b|[^a-zA-Z])` excluding correct prefixes).
      Tracked as V1-CUR-4.

