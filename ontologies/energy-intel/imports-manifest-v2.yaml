      narrativeMentionsExpert, narrativeAppliesPattern,
      narrativeAboutTopic) plus cardinality restrictions A1..A12.
      Top-level energy-intel.ttl owl:imports this module.
    source_iri: null
    pinned_version: "v2"
    extraction_method: hand_seed_owl
    term_file: null
    module_file: modules/editorial.ttl
