# energy-intel — Imports Manifest (V2 delta)
#
# Authored: 2026-05-04 by ontology-curator (V2 release-prep)
# Predecessor: imports-manifest-v1.yaml (V1; commit 1d8f9da)
#
# This file documents only V2 *additions* and *closure-changed* entries
# (where a V1 row was retired from the import closure but the file
# stays on disk). The V0 baseline + V1 delta + this V2 delta are joined
# by the INDEX file. Rows below override the matching id in V1+V0
# (resolution: V2 > V1 > V0) by row id.
#
# Schema: same as V0 (_shared/odk-and-imports.md § 3) plus:
#   * v2_change_type: added | closure_changed | rejected
#   * v2_rationale:   short note pointing at architect-build-log-v2.md anchor
#
# Build script: scripts/extract_oeo_topic_subset.py + scripts/build_editorial.py.

baseline_manifest: imports-manifest.yaml
v1_delta_manifest: imports-manifest-v1.yaml
v1_baseline_commit: "1d8f9da8442204771d469d31680092bc48342407"
authored_at: "2026-05-04"
