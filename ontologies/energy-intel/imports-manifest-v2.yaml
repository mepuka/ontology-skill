      File and concepts dereferenceable via direct load.
    notes: |
      v0.4.0 curator action: per V2-CUR-4 add `owl:deprecated true` and
      `dcterms:isReplacedBy <oeo:OEO_xxx>` to each of the 5 concepts.
      Do not remove the file.

