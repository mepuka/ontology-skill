open_questions:
  - id: V2-IM-Q1
    question: |
      Should v0.4.0 promote `imports/oeo-topic-subset.ttl` as the canonical
      OEO subset and retire `oeo-technology-subset-fixed.ttl` /
      `oeo-carrier-subset-fixed.ttl` from owl:imports? V2 keeps all three
      because V1 fixtures bind narrow technology / carrier roots; V3 may
      consolidate.
    curator_disposition: |
      DEFER to v0.4.0. Re-evaluate after the V2 fixture suite has soaked
      and consumer (skygest-cloudflare) confirms it can use oeo-topic-subset
      for narrativeAboutTopic queries (fixtures in scope: CQ-N4, CQ-T1, T2).

  - id: V2-CUR-2
    question: |
      Fold v2-extra-leak-terms.txt (6 BFO IRIs) into the canonical
      upper-axiom-leak-terms.txt; update extract_oeo_topic_subset.py to
      read only one file.
    curator_disposition: |
      DEFER to v0.4.0. Mechanical change; deferred to give the V2 strip
      pipeline a soak cycle before consolidating.

  - id: V2-CUR-4
    question: |
      Deprecate the 5 SKOS Concepts in technology-seeds.ttl with
      replacement pointers to OEO IRIs?
    curator_disposition: |
      DEFER to v0.4.0. Add owl:deprecated true + dcterms:isReplacedBy
      <oeo:OEO_xxx> per concept; do not remove the file. Validate via
      runoak / robot.
