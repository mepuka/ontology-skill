    refresh_cadence_days: 0
    source_freshness: "2026-05-04 up (local)"
    rejection_rationale: null
    triple_count: 334
    extraction_command: "Programmatic: scripts/build_editorial.py"
    notes: |
      Replaces the V0/V1 hand-seeded technology-seeds.ttl as runtime
      topic authority. technology-seeds.ttl preserved on disk for
      V0/V1 fixture compatibility (V2-CUR-4).

  - id: ei-editorial-v2
    v2_change_type: added
    v2_rationale: |
      V2 editorial extension module — declares ei:Narrative,
      ei:NarrativePostMembership, and 6 object properties
