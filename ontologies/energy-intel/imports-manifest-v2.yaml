    term_file: null
    module_file: modules/concept-schemes/technology-seeds.ttl
    module_iri: https://w3id.org/energy-intel/modules/concept-schemes/technology-seeds
    license: inherits energy-intel license
    refresh_cadence_days: 0
    source_freshness: "2026-05-04 file on disk; not in import closure"
    rejection_rationale: |
