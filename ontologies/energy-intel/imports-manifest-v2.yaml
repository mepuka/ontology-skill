imports:

  # ===================================================================
  # ADDED — V2 net-new imports rows
  # ===================================================================

  - id: oeo-topic-subset-2.11.0
    v2_change_type: added
    v2_rationale: |
      V2 editorial extension introduces ei:narrativeAboutTopic, whose
      values are OEO classes admitted as runtime topic-catalog members
      via OWL 2 punning (skos:Concept on each OEO IRI). To keep the
      project closure HermiT-clean while exposing 41 broad-coverage
      OEO classes (policy / market / climate / technology axes), the
      architect rebuilds an OEO BOT subset over a curated 41-IRI seed
      list and strips BFO+RO leak terms (V1 strip-list + 6 V2 extras).
      Replaces the narrower V1 oeo-technology-subset / oeo-carrier-subset
      role for editorial-graph topic anchors.
      See architect-build-log-v2.md § 7 / 8.

    source_iri: https://openenergyplatform.org/ontology/oeo/oeo-full.owl
    pinned_version: "2.11.0"
    extraction_method: BOT_post_strip
    term_file: imports/oeo-topic-seeds.txt
    strip_term_files:
      - imports/upper-axiom-leak-terms.txt
      - imports/v2-extra-leak-terms.txt
    module_file: imports/oeo-topic-subset.ttl
    module_iri: https://w3id.org/energy-intel/imports/oeo-topic-subset
    license: CC-BY-4.0
    refresh_cadence_days: 90
    source_freshness: "2026-05-04 verified against v2.11.0 release tag"
    rejection_rationale: null
    seed_count: 41
    triple_count: 7729
    seed_terms_summary: |
      41 OEO IRIs covering: energy carriers (coal, oil, nat-gas,
      hydrogen, biomass, geothermal, solar, wind, hydro, nuclear),
      technologies (PV, wind turbine, electrolyzer, battery, CCS),
      market/policy (energy markets, capacity markets, ETS),
      climate (climate change, GHG, decarbonisation), demand
      (electrification, building, transport, industry), grids/storage,
      and more. Full list at imports/oeo-topic-seeds.txt.
    extraction_command: |
      uv run python ontologies/energy-intel/scripts/extract_oeo_topic_subset.py
      # Internally:
      # 1. .local/bin/robot extract --method BOT
      #    --input imports/oeo-full.owl
      #    --term-file imports/oeo-topic-seeds.txt
      #    --output _oeo-topic-subset-raw.ttl
      # 2. .local/bin/robot remove
      #    --term-file imports/upper-axiom-leak-terms.txt (57 terms)
      #    --term-file imports/v2-extra-leak-terms.txt (6 terms)
      #    --trim true --preserve-structure false
      # 3. Add owl:Ontology header.
      # 4. Verify all 41 seeds remain owl:Class; zero BFO refs;
      #    granularity contract holds.
    extracted_at: "2026-05-04"
    notes: |
      * The 6 V2-extra leak terms (`BFO_0000024`, `_0000027`, `_0000029`,
        `_0000031`, `_0000040`, `_0000141`) are BFO IRIs that V2 BOT
        extraction transitively pulled in but V1's strip list missed.
        Curator action V2-CUR-2: at next OEO refresh, fold these into
        the canonical upper-axiom-leak-terms.txt.
      * Granularity contract (CQ-T3) verifier ensures every seed is
        typed owl:Class (not bare NamedIndividual) post-extract.

