      geographic-energy-project, grid-snapshot, learning-curve,
      methodological-critique, structural-economic-analysis). Replaces
      the prior owl:Class + ABox-individuals modeling per source plan
      §S4 / multi-agent design review. Adding a pattern is a PR, not a
      runtime mutation.
    source_iri: null
    pinned_version: "v2"
    extraction_method: hand_seed_skos
    term_file: null
    module_file: modules/concept-schemes/argument-pattern.ttl
    module_iri: https://w3id.org/energy-intel/modules/concept-schemes/argument-pattern
    license: inherits energy-intel license
    refresh_cadence_days: 0
    source_freshness: "2026-05-04 up (local)"
    rejection_rationale: null
    triple_count: 82
    extraction_command: "Programmatic: scripts/build_editorial.py"
    notes: |
      Closed enumeration via SHACL S-V2-2 (sh:sparql; narrativeAppliesPattern
      value MUST be in scheme).

