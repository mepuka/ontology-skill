# energy-intel — CQ Test Manifest (Step 7.5)
#
# parse_status: ok         — `rdflib.plugins.sparql.prepareQuery` accepts the file.
# fixture_run_status:
#   skipped                — no fixture built in Requirements phase. Fixtures land in
#                            ontologies/energy-intel/tests/fixtures/{cq-id}.ttl after
#                            the ontology-architect produces the first TBox slice.
#   pass / fail            — set once fixture is built and query runs against it.
#
# entailment_regime is the minimum regime a downstream reasoner must enable for the
# query to return the contractually-specified rows. CQ-013 / CQ-014 use rdfs:subClassOf*
# property paths, which work under RDFS entailment; Hermit DL is acceptable and
# strictly stronger. CQ-009 is a constraint query whose expected answer is 0 rows;
# any reasoner that materializes negation-as-failure via `FILTER NOT EXISTS` satisfies.
#
# expected_results_contract is the downstream-binding promise: a test-runner can verify
# it by asserting column shape + row-count band + sample row presence against the
# fixture. See _shared/cq-traceability.md § expected-results contract.

