# This file documents only V1 *additions* and *changed-status* entries.
# The V0 manifest stays the source of truth for everything not restated
# here. The architect / curator merge by row id; rows below override the
# matching id in the V0 manifest.
#
# Schema: same as V0 (_shared/odk-and-imports.md § 3) plus:
#   * v1_change_type: added | status_changed | rejected
#   * v1_rationale:   short note pointing at reuse-report-v1.md anchor
#
# Build script: scripts/build_v1_imports.py — reproduces every row marked
# `built_by: scripts/build_v1_imports.py`.

baseline_manifest: imports-manifest.yaml
baseline_commit: "36d1952d9659d336aa8529880ac9fba68ab20aa0"
authored_at: "2026-04-27"
authored_by: ontology-scout
