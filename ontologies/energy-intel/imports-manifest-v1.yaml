reuse_report: docs/reuse-report-v1.md

imports:

  # ===================================================================
  # OEO subsets — STATUS CHANGED from "on disk, not imported" to
  # "BFO+RO-stripped variant, importable, HermiT-clean".
  # ===================================================================

  - id: oeo-technology-2.11.0
    v1_change_type: status_changed
    v1_rationale: |
      V0 BOT extract is on disk but never `owl:imports`-ed because merging
      with V0 BFO-2020 closure produced a HermiT "inconsistent ontology"
      verdict. Validator's V0->curator handoff § 6 raised
      `construct_mismatch` and recommended "remove BFO_* axioms". Scout
      empirically confirms BFO removal alone is INSUFFICIENT: the OEO
      `exogenous data` -> `has role` -> `independent continuant` chain
      conflicts with the BFO `independent / generically-dependent` disjoint.
      Scout SQ-3 evidence: stripping BFO_* AND RO_* via
      `robot remove --term-file ... --trim true --preserve-structure false`
      produces a HermiT-clean closure (0 unsat).
      See reuse-report-v1.md § SQ-3.

    source_iri: https://openenergyplatform.org/ontology/oeo/oeo-full.owl
    pinned_version: "2.11.0"
    extraction_method: BOT_post_strip
    term_file: imports/upper-axiom-leak-terms.txt   # 29 BFO + 28 RO IRIs
    module_file: imports/oeo-technology-subset-fixed.ttl
    license: CC-BY-4.0
    refresh_cadence_days: 90
    source_freshness: "2026-04-27 verified against v2.11.0 release tag (last published 2026-03-04)"
    rejection_rationale: null
    seed_terms:
      # IDENTICAL to V0 (verified against local oeo-full.owl 2026-04-27).
      # Both seeds present, owl:Class, not owl:deprecated, labels match.
      - "https://openenergyplatform.org/ontology/oeo/OEO_00020267"   # energy technology
      - "https://openenergyplatform.org/ontology/oeo/OEO_00000011"   # energy converting component
    seed_evidence:
      verified_at: "2026-04-27"
      method: "rdflib parse of imports/oeo-full.owl + label/parent check"
      results:
        - iri: "https://openenergyplatform.org/ontology/oeo/OEO_00020267"
          label: "energy technology"
          parent: "https://openenergyplatform.org/ontology/oeo/OEO_00000407"   # technology
          deprecated: false
          owl_class: true
        - iri: "https://openenergyplatform.org/ontology/oeo/OEO_00000011"
          label: "energy converting component"
          parent: "https://openenergyplatform.org/ontology/oeo/OEO_00000061"   # artificial object
          deprecated: false
          owl_class: true
    extraction_command: |
      # Step 1: V0 BOT extract is already on disk at imports/oeo-technology-subset.ttl.
      # Step 2: V1 strip.
      .local/bin/robot remove \
        --input ontologies/energy-intel/imports/oeo-technology-subset.ttl \
        --term-file ontologies/energy-intel/imports/upper-axiom-leak-terms.txt \
        --trim true \
        --preserve-structure false \
        --output ontologies/energy-intel/imports/oeo-technology-subset-fixed.ttl
    pre_strip_class_count: 446
    post_strip_class_count: 336
    notes: |
      * The `term_file` is a list of IRIs to *strip*, not seeds. It contains
        29 BFO classes/properties and 28 RO object properties — every upper-
        ontology IRI that BOT extraction transitively dragged in and that
        creates conflicts with V0's BFO-2020 import.
      * Architect imports `imports/oeo-technology-subset-fixed.ttl` (NOT the
        V0 `oeo-technology-subset.ttl`).
      * Both V0 root seeds remain present after stripping; the OEO class
        hierarchy walk for CQ-015 is preserved.

