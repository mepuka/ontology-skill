  # ===================================================================
  # QUDT — STATUS CHANGED from "rejected (full schema, too big)" to
  # "narrow vocab/unit + vocab/quantitykind slice imported".
  # ===================================================================

  - id: qudt-units-2.1
    v1_change_type: status_changed
    v1_rationale: |
      V0 left QUDT 2.1 unimported with `ei:assertedUnit xsd:string`. V1
      adds `ei:canonicalUnit -> qudt:Unit` (CQ-016) and (per scout SQ-2)
      `ei:hasQuantityKind -> qudt:QuantityKind` on Variable (CQ-017).
      Scout decision: extract BOTH qudt:Unit AND qudt:QuantityKind,
      slicing only the units actually used by V1 sample claims plus the
      QuantityKinds those units `qudt:hasQuantityKind`. Total subset size:
      859 triples (56 KB) — well below the 400-class threshold and orders
      of magnitude smaller than the full QUDT vocab/unit (2.4 MB) or
      vocab/quantitykind (1.7 MB). See reuse-report-v1.md § SQ-2 for the
      cost-benefit analysis.
    source_iri:
      - "https://qudt.org/2.1/vocab/unit"
      - "https://qudt.org/2.1/vocab/quantitykind"
    pinned_version: "2.1"
    extraction_method: programmatic_slice
    term_file: scripts/build_v1_imports.py    # seeds embedded as QUDT_UNIT_SEEDS tuple
    module_file: imports/qudt-units-subset.ttl
    license: CC-BY-4.0
    refresh_cadence_days: 180
    source_freshness: "2026-04-27 fetched live; cached at imports/qudt-source/"
    rejection_rationale: null
    seed_units:
      # Seeds verified present in QUDT 2.1 vocab/unit on 2026-04-27.
      # NOTE: V0 manifest's seed list (`unit:GW`, `unit:MW`, `unit:TW-HR`)
      # was WRONG — those IRIs do not exist in QUDT 2.1. The correct names
      # use the SI-prefix-as-word convention (GigaW, MegaW, TeraW-HR).
      power: ["GigaW", "MegaW", "TeraW", "KiloW", "W"]
      energy_watt_hour: ["TeraW-HR", "GigaW-HR", "MegaW-HR", "KiloW-HR"]
      energy_joule: ["PetaJ", "TeraJ", "GigaJ", "J", "BTU_IT"]
      mass: ["TON_Metric", "KiloGM", "GM"]
      volume: ["BBL", "BBL_UK_PET"]
      intensity: ["KiloGM-PER-J"]
      electrical: ["HZ", "V", "A"]
      misc: ["PERCENT", "KiloMOL"]
    seed_quantitykinds:
      # Pulled transitively from `qudt:hasQuantityKind` triples on the seed
      # units (39 distinct QKs because some units like `A` declare multiple
      # QK linkages — ElectricCurrent, ElectricCurrentPhasor, etc.).
      core_relevant_to_v1:
        - "Power"
        - "ActivePower"
        - "Energy"
        - "ThermalEnergy"
        - "Mass"
        - "MassPerEnergy"
        - "Volume"
        - "Frequency"
        - "ElectricCurrent"
        - "ElectricPotential"
        - "Voltage"
        - "DimensionlessRatio"
        - "AmountOfSubstance"
      transitively_pulled_low_priority:
        - "DisplacementCurrent"
        - "ElectricCurrentPhasor"
        - "ElectricPotentialDifference"
        - "EnergyPerElectricCharge"
        - "ExchangeIntegral"
        - "HamiltonFunction"
        - "LagrangeFunction"
        - "LengthPercentage"
        - "LevelWidth"
        - "MagneticTension"
        - "MagnetomotiveForce"
        - "OpeningRatio"
        - "PressurePercentage"
        - "Prevalence"
        - "Reflectance"
        - "RelativeHumidity"
        - "RelativeLuminousFlux"
        - "RelativePartialPressure"
        - "ResistancePercentage"
        - "RotationalFrequency"
        - "RotationalVelocity"
        - "TimePercentage"
        - "TotalCurrent"
        - "VoltagePercentage"
        - "CO2Equivalent"
        - "CurrentLinkage"
    extraction_command: |
      # Programmatic slice (rdflib). See scripts/build_v1_imports.py:
      uv run python ontologies/energy-intel/scripts/build_v1_imports.py
      # The script:
      #   1. Fetches QUDT 2.1 vocab/unit + vocab/quantitykind to imports/qudt-source/.
      #   2. Pulls qudt:Unit triples for each seed in QUDT_UNIT_SEEDS.
      #   3. Pulls qudt:QuantityKind triples for every QK transitively
      #      reached via qudt:hasQuantityKind on a seed unit.
      #   4. Filters annotation noise (keeps label, symbol, hasQuantityKind,
      #      hasDimensionVector, conversionMultiplier, dcterms:description).
      #   5. Writes imports/qudt-units-subset.ttl.
    triple_count: 859
    file_size_bytes: 56534
    notes: |
      * Architect imports `imports/qudt-units-subset.ttl`.
      * Conceptualizer property-design call: `ei:canonicalUnit` ranges over
        `qudt:Unit` (CQ-016 must_have); `ei:hasQuantityKind` (range
        `qudt:QuantityKind`) decision is GO per scout SQ-2 — CQ-017 stays
        `should_have` not dropped to `wont_have`.

