# -------------------------------------------------------------------
# Refresh-policy notes for V1 (curator audit)
# -------------------------------------------------------------------
refresh_policy_notes: |
  * OEO 2.11.0 -> 90-day cadence (per validator handoff). Re-run
    scripts/build_v1_imports.py on each refresh; it re-strips BFO+RO
    and re-validates HermiT.
  * QUDT 2.1 -> 180-day cadence. Re-run scripts/build_v1_imports.py;
    if QUDT releases 3.x, scout escalates: schema rename + breaking
    changes likely.
  * Both BFO and RO are stripped by IRI list, not by namespace prefix.
    If OEO upstream introduces NEW BFO or RO IRIs in a future release,
    scripts/build_v1_imports.py will leak them. Curator must compare
    the BFO/RO IRI set in the OEO subset against
    imports/upper-axiom-leak-terms.txt at every OEO refresh.

# -------------------------------------------------------------------
# Open questions (carry-forward to architect / conceptualizer)
# -------------------------------------------------------------------
open_questions:
  - id: V1-IM-Q1
    question: |
      Should V1 promote `imports/oeo-{technology,carrier}-subset-fixed.ttl`
      to canonical names (delete the unfixed V0 subsets)?
    answer_owner: curator
    scout_recommendation: |
      Keep both pairs in V0.x, deprecate V0 unfixed at first release that
      ships V1; replacement-pointer via dcterms:isReplacedBy in the V0
      file's ontology header.

  - id: V1-IM-Q2
    question: |
      Are the 25 transitively-pulled low-priority QuantityKinds (Reflectance,
      RotationalVelocity, etc.) acceptable bloat, or should they be
      stripped?
    answer_owner: conceptualizer
    scout_recommendation: |
      KEEP. They cost <100 triples, never appear in CMC range constraints
      (only the unit-side declares them via qudt:hasQuantityKind), and
      removing them would force a second pass over the QUDT graph. The
      cost is negligible.

  - id: V1-IM-Q3
    question: |
      Should we expose `ei:hasQuantityKind` on `Variable` (V2 facet) or
      on `CanonicalMeasurementClaim`?
    answer_owner: conceptualizer
    scout_recommendation: |
      On Variable per scope-v1.md § 2 line 54. CMC already routes through
      Variable for cross-expert join semantics (Linear D7); replicating
      hasQuantityKind on CMC would create two sources of truth.
