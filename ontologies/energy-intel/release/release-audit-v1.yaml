    S-V1-1: "ei:canonicalUnit value MUST be in QUDT 25-unit subset (sh:in)"
    S-V1-2: "Resolvability gate (Warning): assertedUnit without canonicalUnit"
    S-V1-3: "Post.authoredBy author MUST bear ei:EnergyExpertRole"
    S-V1-4: "PodcastSegment.spokenBy speaker SHOULD bear ei:EnergyExpertRole (Warning)"
    S-V1-5: "ei:aboutTechnology value MUST be in skos:Concept OR an OEO subtree"
