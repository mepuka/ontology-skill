v1_scope:
  axiom_obligations:
    A1: "Mint ei:EnergyExpertRole (parent bfo:0000023; bfo:0000052 some foaf:Person)"
    A2: "Redefine ei:Expert as EquivalentTo foaf:Person ⊓ ∃bfo:0000053.EnergyExpertRole; drop V0 SubClassOf foaf:Person"
    A3: "AllDisjointClasses(EnergyExpertRole, PublisherRole, DataProviderRole)"
    A4: "Mint ei:canonicalUnit ObjectProperty + FunctionalProperty (CMC -> qudt:Unit)"
    A5: "CMC SubClassOf ei:canonicalUnit max 1 qudt:Unit (qualified max-cardinality)"
    A6: "Widen ei:authoredBy range to foaf:Person; Post restriction onClass updated"
    A7: "Widen ei:spokenBy range to foaf:Person"
    A8: "Wire 3 V1 owl:imports (oeo-technology-subset, oeo-carrier-subset, qudt-units-subset); bump versionIRI"
