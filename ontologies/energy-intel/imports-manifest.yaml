# energy-intel — Imports Manifest (scout phase)
#
# Authored: 2026-04-22 by ontology-scout
# Source of truth: this file. Architect consumes on first TBox slice; curator
# consumes on refresh. Schema follows _shared/odk-and-imports.md § 3.
#
# Notes:
#   * Every row has: source_iri, pinned_version, extraction_method, term_file,
#     module_file, license, refresh_cadence_days, source_freshness,
#     rejection_rationale (null on selected imports).
#   * extraction_method is one of:
#       full_import | MIREOT | STAR | BOT | TOP | SUBSET | bridge | rejected
#   * Architect will run the `robot extract` commands documented under
#     `extraction_command:` to produce `module_file`. Scout does not run the
#     extracts (scope constraint).
#   * `pinned_version` is the upstream release tag or versionIRI date. All
#     values verified 2026-04-22 against live upstream registries except where
#     `source_freshness` is marked `cached`.

imports:

  # ---------- Upper / foundational ----------

  - id: bfo-2020
    source_iri: http://purl.obolibrary.org/obo/bfo.owl
    pinned_version: "2020"
    extraction_method: full_import
    term_file: null
    module_file: imports/bfo-2020.ttl
    license: CC-BY-4.0
    refresh_cadence_days: 365
    source_freshness: "2026-04-22 up"
    rejection_rationale: null
    seed_terms:
      - "http://purl.obolibrary.org/obo/BFO_0000023"   # role
      - "http://purl.obolibrary.org/obo/BFO_0000027"   # object aggregate
      - "http://purl.obolibrary.org/obo/BFO_0000020"   # specifically dependent continuant
    extraction_command: "# full import — no extract needed. Architect declares owl:imports <http://purl.obolibrary.org/obo/bfo.owl>."
    notes: |
      BFO 2020 is the ISO 21838-2:2021 standard upper ontology. Small vocabulary
      (~50 classes). Use owl:imports directly. Verified labels/defs against
      OLS4 v2 2026-04-22.

  - id: iao-2026-03
    source_iri: http://purl.obolibrary.org/obo/iao.owl
    pinned_version: "v2026-03-30"
    extraction_method: MIREOT
    term_file: imports/iao-terms.txt
    module_file: imports/iao-subset.ttl
    license: CC-BY-4.0
    refresh_cadence_days: 120
    source_freshness: "2026-04-22 up"
    rejection_rationale: null
    seed_terms:
      - "http://purl.obolibrary.org/obo/IAO_0000030"   # information content entity
      - "http://purl.obolibrary.org/obo/IAO_0000310"   # document
      - "http://purl.obolibrary.org/obo/IAO_0000101"   # image
      - "http://purl.obolibrary.org/obo/IAO_0000027"   # data entity (alt: data item)
      - "http://purl.obolibrary.org/obo/IAO_0000300"   # textual entity (architect verifies exists in v2026-03-30)
    extraction_command: |
      .local/bin/robot extract \
        --method MIREOT \
        --input-iri http://purl.obolibrary.org/obo/iao.owl \
        --lower-terms ontologies/energy-intel/imports/iao-terms.txt \
        --output ontologies/energy-intel/imports/iao-subset.ttl
    notes: |
      MIREOT chosen to keep footprint minimal. Seeds are the five classes
      referenced in reuse-report § B. Architect verifies IAO_0000300 existence
      in v2026-03-30; if it has been merged into IAO_0000030, drop the seed
      and use the general ICE for Excerpt.

