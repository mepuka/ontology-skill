      # from OEO v2.11.0 source tarball via `robot merge`.
      .local/bin/robot extract \
        --method BOT \
        --input ontologies/energy-intel/imports/oeo-full.owl \
        --term https://openenergyplatform.org/ontology/oeo/OEO_00020267 \
        --term https://openenergyplatform.org/ontology/oeo/OEO_00000011 \
        --output ontologies/energy-intel/imports/oeo-technology-subset.ttl
    notes: |
      Dual-root extract (plan-spec tier + material-entity tier) per
      oeo-seed-verification.md. Combined transitive closure ~90 classes;
      comfortably under the 400-class abort threshold. Scope original
      OEO_00000030 ("oil power unit") was wrong — not a root.

