handoff_to_scout:
  blocking_questions: []
  notes: |
    V2 does not add any top-level imports — it reorganises the OEO subset
    surface (rebuilds imports/oeo-topic-subset.ttl from imports/oeo-full.owl
    against the 41-IRI editorial topic seed list per scope-v2.md §
    In-scope item 3). The rebuild is an architect-skill concern (ROBOT
    extract), not a scout-skill concern. Scout phase is not required for
    V2; the pipeline goes directly to conceptualizer.

handoff_to_conceptualizer:
  blocking_questions:
    - id: V2-CQ-Q-1
      question: "SKOS scheme split for topic vocabulary: single ei:concept/topic OR split (ei:concept/oeo-topic + ei:concept/editorial-supplement) + aggregator?"
      target: "Decision in conceptual-model-v2.md and topic-vocabulary-mapping.md."
      recommendation: "Split + aggregator (claiming OEO IRIs as members of a Skygest-namespaced ei:concept/... scheme they don't natively belong to is semantically off)."
      source: "Source plan §9 Q7; scope-v2.md Open Question 1."
    - id: V2-CQ-Q-2
      question: "OEO topic IRI verification: which of the 41 candidates in handoff §'OEO topic subset rebuild' resolve cleanly in oeo-full.owl, and which require Local-only fallback?"
      target: "Decision per row in topic-vocabulary-mapping.md (Phase 2 deliverable). Each row records source label, source line in oeo-full.owl, confidence score, supplement IRI if applicable."
      recommendation: "Run robot extract --method BOT against the 41-IRI seed list, then BFO+RO-strip per imports/upper-axiom-leak-terms.txt. Verify each accepted IRI has rdfs:label matching editorial intent and is owl:Class (not owl:NamedIndividual)."
      source: "Source plan §3.4 + §9 Q2; scope-v2.md § In-scope item 3."
    - id: V2-CQ-Q-3
      question: "NarrativePostMembership IRI derivation function: what is the deterministic hash of (narrativeIri, postUri)?"
      target: "Decision in conceptual-model-v2.md / property-design-v2.md / narrative-identity-rule.md."
      recommendation: "sha256 truncated to 16 chars, base32-encoded; constraint is must be deterministic from the pair without runtime ambiguity, must round-trip on re-import, must not collide at any reasonable scale."
      source: "Source plan §3.3 + §S5; scope-v2.md § In-scope item 6."
    - id: V2-CQ-Q-4
      question: "Range constraint of ei:memberRole: SHACL-only or owl:allValuesFrom too?"
      target: "Decision in property-design-v2.md."
      recommendation: "SHACL-only — keep range as bare skos:Concept at the OWL level (per existing pattern from V1's narrativeAppliesPattern); use SHACL sh:in or sh:hasValue to constrain to scheme members. owl:allValuesFrom over a closed enumeration would force an open-world-defeating axiom that doesn't match how SKOS schemes are typically reasoned over."
      source: "Source plan §3.3."

handoff_to_architect:
  blocking_questions:
    - id: V2-A-Q-1
      question: "OEO topic subset rebuild: validate that robot extract --method BOT against the 41-IRI seed list produces a DL-clean module after BFO+RO strip."
      target: "Reasoner-clean evidence in architect-build-log-v2.md; stripped-fixture at imports/oeo-topic-subset.ttl."
      recommendation: "Mirror the V1 BFO-strip approach used for imports/oeo-{technology,carrier}-subset-fixed.ttl; reuse imports/upper-axiom-leak-terms.txt and imports/bfo-terms-to-remove.txt. If HermiT misbehaves, fall back to materialising OEO class hierarchy as skos:broader chain."
      source: "Source plan §3.1 + handoff §'OEO topic subset rebuild — concrete spec'."

cross_repo_open_questions:
  - id: V2-X-Q-1
    target_repo: "skygest-cloudflare"
    question: "Signal preservation under umbrella collapse — does any current consumer rely on the *original* leaf concept granularity that conceptToCanonicalTopicSlug's umbrella collapse would lose?"
    recommendation: "If yes, Phase 2 topic-vocabulary-mapping.md must preserve the leaf concept as well as the umbrella. Cloudflare side answers; ontology side adapts."
    source: "Source plan §9 Q3."
  - id: V2-X-Q-2
    target_repo: "skygest-cloudflare"
    question: "Should attach_post_to_narrative accept multiple posts in one call?"
    recommendation: "Ontology should not constrain it either way. Note in conceptual-model-v2.md that the cardinality of ei:hasNarrativePostMembership is `many` and order is not preserved."
    source: "Source plan §9 Q5."
  - id: V2-X-Q-3
    target_repo: "skygest-cloudflare"
    question: "After Pattern A migration window, is the legacy topic_slug column dropped or retained indefinitely?"
    recommendation: "Annotate every Skygest supplement IRI with skos:notation carrying the legacy slug, so the migration map is queryable from the ontology itself for at least one release window. Cloudflare side decides drop date."
    source: "Source plan §9 Q6; scope-v2.md Open Question 4."

notes: |
  V2 inherits V0 + V1 baselines cleanly. The editorial extension is a
  greenfield slice — V2 does not modify any V0+V1 class or property; it
  adds a new module (modules/editorial.ttl) plus three new SKOS schemes,
  and rebuilds the OEO topic subset. The risk surface is narrow: the
  retired V1 modules/concept-schemes/technology-seeds.ttl is replaced by
  modules/concept-schemes/oeo-topics.ttl, which affects only the
  ei:aboutTechnology value-set surface — V0 CQs CQ-013, CQ-014 and V1
  CQ-015 walk this via SPARQL property paths and continue to pass against
  the new topic subset (a fixture refresh, not a structural change).

  V2 explicitly does not touch:
  - Seven-facet Variable model (still V3+ for the data layer; V2 is
    editorial-only).
  - Expert subrole taxonomy (still single role only).
  - SHACL coverage backfill for the seven `intent: validate` properties
    not yet shaped in V0 (still deferred).
  - Edition (newsletter compile) — still out of scope; source plan §2
    keeps it out.
  - Narrative arc as ontology entity (filesystem-only per S2; future
    Arc as iao:Document with ei:hasNarrativePart would integrate without
    breaking changes per source plan §9 Q1, but is not in V2).

  Sign-off below remains `pending` until reviewer endorses. Validator
  will re-validate the full V0 + V1 + V2 CQ suite at release gate per
  scope-v2.md § V0 + V1 CQ revalidation guarantee.

