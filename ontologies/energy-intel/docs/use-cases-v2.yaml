# V2 Use Cases — `energy-intel` (Editorial Extension)
#
# Inherits V0 use cases UC-001..UC-005 unchanged from `use-cases.yaml`
# and V1 use cases UC-006..UC-008 unchanged from `use-cases-v1.yaml`.
# This file documents only the V2 additions (UC-009..UC-014) driving
# new CQs CQ-N1..CQ-N8 and CQ-T1..CQ-T3.
#
# Authored: 2026-05-04 by ontology-requirements (V2 iteration)
