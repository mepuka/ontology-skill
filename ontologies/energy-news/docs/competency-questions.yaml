- id: CQ-017
  source_use_case: UC-003
  natural_language: "Which platforms have the most energy news posts?"
  type: quantitative
  priority: should_have
  sample_answer:
    - platform: enews:Bluesky
      label: "Bluesky"
      postCount: 3
    - platform: enews:Twitter
      label: "Twitter"
      postCount: 1
  derivation_method: aggregation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?platform ?platformLabel (COUNT(?post) AS ?postCount) WHERE {
      ?post a enews:Post ;
            enews:postedBy ?author .
      ?author enews:onPlatform ?platform .
      ?platform rdfs:label ?platformLabel .
    }
    GROUP BY ?platform ?platformLabel
    ORDER BY DESC(?postCount)
  expected_result: non_empty
  required_classes: [Post, AuthorAccount, SocialMediaPlatform]
  required_properties: [postedBy, onPlatform]
  out_of_scope: "Does not filter by date range or topic"
  required_axioms:
    - "AuthorAccount SubClassOf onPlatform some SocialMediaPlatform"
  requires_reasoning: false

