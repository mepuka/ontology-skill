# Energy News Ontology — Competency Questions
# Updated: Codex review remediation — PREFIX declarations, new fields, SKOS SPARQL, CQ-015/016

# --- Must Have ---

- id: CQ-001
  source_use_case: UC-001
  natural_language: "What energy topics exist in the ontology?"
  type: enumerative
  priority: must_have
  sample_answer:
    - topic: enews:Solar
      label: "Solar"
    - topic: enews:NaturalGas
      label: "Natural Gas"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?topic ?label WHERE {
      ?topic a enews:EnergyTopic ;
             rdfs:label ?label .
    }
  expected_result: non_empty
  required_classes: [EnergyTopic]
  out_of_scope: "Does not return hierarchy depth or broader/narrower structure"
  required_axioms:
    - "enews:Solar rdf:type enews:EnergyTopic"
    - "enews:Solar rdfs:label 'Solar'@en"
  requires_reasoning: false

- id: CQ-002
  source_use_case: UC-001
  natural_language: "What subtopics exist under a given energy topic?"
  type: enumerative
  priority: must_have
  sample_answer:
    - parent: enews:Renewable
      child: enews:Solar
      label: "Solar"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
    SELECT ?child ?label WHERE {
      ?child skos:broader enews:Renewable ;
             rdfs:label ?label .
    }
  expected_result: non_empty
  required_classes: [EnergyTopic]
  out_of_scope: "Returns only direct narrower topics, not transitive descendants"
  required_axioms:
    - "enews:Solar skos:broader enews:Renewable"
    - "enews:Solar rdfs:label 'Solar'@en"
  requires_reasoning: false

- id: CQ-003
  source_use_case: UC-001
  natural_language: "Which articles cover a given energy topic?"
  type: relational
  priority: must_have
  sample_answer:
    - article: enews:article_001
      title: "CATL signs multi-GWh storage agreements"
      topic: enews:EnergyStorage
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?article ?title WHERE {
      ?article a enews:Article ;
               enews:coversTopic enews:EnergyStorage ;
               enews:title ?title .
    }
  expected_result: non_empty
  required_classes: [Article, EnergyTopic]
  required_properties: [coversTopic, title]
  out_of_scope: "Does not traverse topic hierarchy; only returns exact topic matches"
  required_axioms:
    - "Article SubClassOf coversTopic some EnergyTopic"
  requires_reasoning: false

- id: CQ-004
  source_use_case: UC-002
  natural_language: "Which publication published a given article?"
  type: relational
  priority: must_have
  sample_answer:
    - article: enews:article_001
      publication: enews:pub_canary_media
      label: "Canary Media"
  derivation_method: direct_lookup
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?article ?pub ?pubLabel WHERE {
      ?article a enews:Article ;
               enews:publishedBy ?pub .
      ?pub rdfs:label ?pubLabel .
    }
  expected_result: non_empty
  required_classes: [Article, Publication]
  required_properties: [publishedBy]
  out_of_scope: "Does not identify articles without a known publisher"
  required_axioms:
    - "publishedBy rdf:type owl:FunctionalProperty"
  requires_reasoning: false

- id: CQ-005
  source_use_case: UC-002
  natural_language: "What energy topics does a given publication cover?"
  type: relational
  priority: must_have
  sample_answer:
    - publication: enews:pub_bloomberg
      topic: enews:Oil
  derivation_method: aggregation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT DISTINCT ?topic ?topicLabel WHERE {
      ?article enews:publishedBy enews:pub_bloomberg ;
               enews:coversTopic ?topic .
      ?topic rdfs:label ?topicLabel .
    }
  expected_result: non_empty
  required_classes: [Article, Publication, EnergyTopic]
  required_properties: [publishedBy, coversTopic]
  out_of_scope: "Does not rank topics by frequency or include hierarchy traversal"
  required_axioms: []
  requires_reasoning: false

- id: CQ-006
  source_use_case: UC-002
  natural_language: "How many articles has each publication contributed?"
  type: quantitative
  priority: must_have
  sample_answer:
    - publication: enews:pub_canary_media
      count: 339
  derivation_method: aggregation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?pub ?pubLabel (COUNT(?article) AS ?count) WHERE {
      ?article a enews:Article ;
               enews:publishedBy ?pub .
      ?pub rdfs:label ?pubLabel .
    }
    GROUP BY ?pub ?pubLabel
    ORDER BY DESC(?count)
  expected_result: non_empty
  required_classes: [Article, Publication]
  required_properties: [publishedBy]
  out_of_scope: "Does not filter by date range or topic"
  required_axioms: []
  requires_reasoning: false

- id: CQ-007
  source_use_case: UC-003
  natural_language: "Who are the top authors sharing energy news?"
  type: quantitative
  priority: must_have
  sample_answer:
    - author: enews:author_torsolarfred
      handle: "torsolarfred.bsky.social"
      postCount: 300
  derivation_method: aggregation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    SELECT ?author ?handle (COUNT(?post) AS ?postCount) WHERE {
      ?post a enews:Post ;
            enews:postedBy ?author .
      ?author enews:handle ?handle .
    }
    GROUP BY ?author ?handle
    ORDER BY DESC(?postCount)
  expected_result: non_empty
  required_classes: [Post, AuthorAccount]
  required_properties: [postedBy, handle]
  out_of_scope: "Does not filter by topic or date range"
  required_axioms:
    - "Post SubClassOf postedBy some AuthorAccount"
    - "postedBy rdf:type owl:FunctionalProperty"
    - "HasKey(AuthorAccount, handle)"
  requires_reasoning: false

- id: CQ-008
  source_use_case: UC-003
  natural_language: "What energy topics does a given author primarily share about?"
  type: relational
  priority: must_have
  sample_answer:
    - author: enews:author_torsolarfred
      topic: enews:Solar
  derivation_method: aggregation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?topic ?topicLabel (COUNT(?post) AS ?count) WHERE {
      ?post enews:postedBy enews:author_torsolarfred ;
            enews:sharesArticle ?article .
      ?article enews:coversTopic ?topic .
      ?topic rdfs:label ?topicLabel .
    }
    GROUP BY ?topic ?topicLabel
    ORDER BY DESC(?count)
  expected_result: non_empty
  required_classes: [Post, AuthorAccount, Article, EnergyTopic]
  required_properties: [postedBy, sharesArticle, coversTopic]
  out_of_scope: "Does not include posts without shared articles"
  required_axioms:
    - "sharesArticle rdf:type owl:FunctionalProperty"
  requires_reasoning: false

