- id: CQ-010
  source_use_case: UC-003
  natural_language: "Is a given energy source classified as renewable or fossil?"
  type: boolean
  priority: must_have
  sample_answer:
    - source: enews:Solar
      category: enews:Renewable
  derivation_method: inference
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
    ASK {
      enews:Solar skos:broader* enews:Renewable .
    }
  expected_result: "true"
  required_classes: [EnergyTopic]
  out_of_scope: "Does not classify topics outside Renewable/Fossil (e.g., Nuclear, Hydrogen)"
  required_axioms:
    - "enews:Solar skos:broader enews:Renewable"
  requires_reasoning: false

