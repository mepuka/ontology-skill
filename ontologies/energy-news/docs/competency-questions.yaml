- id: CQ-019
  source_use_case: UC-002
  natural_language: "Which publication published an article based on its URL domain?"
  type: relational
  priority: should_have
  sample_answer:
    - article: enews:article_001
      url: "https://bloomberg.com/example/storage"
      domain: "bloomberg.com"
      pub: enews:pub_bloomberg
      pubLabel: "Bloomberg"
  derivation_method: derivation
  sparql: |
    PREFIX enews: <http://example.org/ontology/energy-news#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?article ?url ?domain ?pub ?pubLabel WHERE {
      ?article a enews:Article ; enews:url ?url .
      BIND(REPLACE(STR(?url), "^https?://([^/]+).*$", "$1") AS ?urlDomainRaw)
      BIND(IF(STRSTARTS(?urlDomainRaw, "www."),
              SUBSTR(?urlDomainRaw, 5), ?urlDomainRaw) AS ?domain)
      ?pub a enews:Publication ;
           enews:siteDomain ?domain ;
           rdfs:label ?pubLabel .
    }
  expected_result: non_empty
  required_classes: [Article, Publication]
  required_properties: [url, siteDomain]
  out_of_scope: "Does not handle subdomain mismatches (e.g. news.bloomberg.com vs bloomberg.com)"
  required_axioms: []
  requires_reasoning: false
