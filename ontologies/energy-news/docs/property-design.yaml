# Energy News Ontology — Property Design
# Produced by: ontology-conceptualizer (Phase 3)
# Updated: Codex review remediation — bfo_ro_relation, naming fixes, AuthorAccount

# --- Object Properties ---

object_properties:

  - name: coversTopic
    type: ObjectProperty
    definition: "Links an Article to an EnergyTopic individual it covers"
    domain: Article
    range: EnergyTopic
    cardinality:
      min: 1
      max: unbounded
    characteristics: []
    inverse: null
    schema_alignment: "owl:equivalentProperty schema:about"
    bfo_ro_relation: "rdfs:subPropertyOf IAO:0000136 (is_about)"
    notes: >
      An article must cover at least one topic. Multiple topics are common
      (e.g., an article about solar tariffs covers both Solar and Tariff).
      No cardinality ceiling — articles can cover many topics. Range is
      EnergyTopic (instances are SKOS Concept individuals).

  - name: publishedBy
    type: ObjectProperty
    definition: "Links an Article to the Publication that published it"
    domain: Article
    range: Publication
    cardinality:
      min: 0
      max: 1
    characteristics: [functional]
    inverse: null
    schema_alignment: "owl:equivalentProperty schema:publisher"
    bfo_ro_relation: "none (social/institutional relation)"
    notes: >
      Functional — each article has at most one publisher. Min 0 because
      some articles may come from unidentified sources. The Publication is
      identified by domain name extraction from the article URL.

  - name: postedBy
    type: ObjectProperty
    definition: "Links a Post to the AuthorAccount who created it"
    domain: Post
    range: AuthorAccount
    cardinality:
      min: 1
      max: 1
    characteristics: [functional]
    inverse: null
    schema_alignment: "rdfs:subPropertyOf schema:author"
    bfo_ro_relation: "none (social/institutional relation)"
    notes: >
      Functional — every post has exactly one author account.
      SubPropertyOf (not equivalentProperty) because schema:author has a
      broader range (Person or Organization).

  - name: sharesArticle
    type: ObjectProperty
    definition: "Links a Post to the Article it shares via embedded link"
    domain: Post
    range: Article
    cardinality:
      min: 0
      max: 1
    characteristics: [functional]
    inverse: null
    schema_alignment: "owl:equivalentProperty schema:sharedContent"
    bfo_ro_relation: "none (social/institutional relation)"
    notes: >
      Functional — a post shares at most one article link. Min 0 because
      some posts may be text-only commentary without an embedded article.

  - name: mentionsOrganization
    type: ObjectProperty
    definition: "Links an Article to an Organization mentioned in its coverage"
    domain: Article
    range: Organization
    cardinality:
      min: 0
      max: unbounded
    characteristics: []
    inverse: null
    schema_alignment: "rdfs:subPropertyOf schema:mentions"
    bfo_ro_relation: "rdfs:subPropertyOf IAO:0000136 (is_about)"
    notes: >
      Should-have property (CQ-012). Articles may mention zero or many
      organizations. SubPropertyOf schema:mentions because our range is
      restricted to Organization while schema:mentions allows any Thing.

  - name: hasGeographicFocus
    type: ObjectProperty
    definition: "Links an Article to a GeographicEntity representing its geographic focus"
    domain: Article
    range: GeographicEntity
    cardinality:
      min: 0
      max: unbounded
    characteristics: []
    inverse: null
    schema_alignment: "owl:equivalentProperty schema:contentLocation"
    bfo_ro_relation: "rdfs:subPropertyOf IAO:0000136 (is_about)"
    notes: >
      Should-have property (CQ-014). Articles may have zero geographic
      focus (abstract/global topics) or multiple (cross-border coverage).

  - name: hasSector
    type: ObjectProperty
    definition: "Links an Organization to an EnergyTopic sector it operates in"
    domain: Organization
    range: EnergyTopic
    cardinality:
      min: 0
      max: unbounded
    characteristics: []
    inverse: null
    bfo_ro_relation: "rdfs:subPropertyOf IAO:0000136 (is_about)"
    notes: >
      Should-have property (CQ-015). This enables explicit sector typing
      for organizations (for example CATL hasSector EnergyStorage and
      hasSector Manufacturing). Multiple sectors are allowed.

  - name: onPlatform
    type: ObjectProperty
    definition: "Links an AuthorAccount or Feed to the SocialMediaPlatform it belongs to"
    domain: null
    range: SocialMediaPlatform
    cardinality:
      min: 1
      max: 1
    characteristics: [functional]
    inverse: null
    bfo_ro_relation: "none (social/institutional relation)"
    notes: >
      Functional — every author account and feed belongs to exactly one
      platform. No rdfs:domain declared because the property is used by both
      AuthorAccount and Feed, which are disjoint classes; an rdfs:domain on
      either would cause incorrect type inference on the other. Structural
      validation is enforced via SHACL shapes instead. Combined with handle
      to form a composite HasKey for AuthorAccount.

# --- Datatype Properties ---

datatype_properties:

  - name: handle
    type: DatatypeProperty
    definition: "The handle or username string for an AuthorAccount"
    domain: AuthorAccount
    range: xsd:string
    cardinality:
      min: 1
      max: 1
    characteristics: [functional]
    bfo_ro_relation: "none (literal attribute)"
    notes: >
      Format varies by platform (e.g. "user.bsky.social" for Bluesky,
      "@user" for Twitter). Functional — each AuthorAccount has exactly one
      handle. Part of composite HasKey with onPlatform.

  - name: title
    type: DatatypeProperty
    definition: "The headline or title string of an Article"
    domain: Article
    range: xsd:string
    cardinality:
      min: 0
      max: 1
    characteristics: [functional]
    schema_alignment: "owl:equivalentProperty schema:headline"
    bfo_ro_relation: "none (literal attribute)"
    notes: >
      Functional. Min 0 because some embedded links may lack title metadata.

  - name: url
    type: DatatypeProperty
    definition: "The URL of an Article"
    domain: Article
    range: xsd:anyURI
    cardinality:
      min: 1
      max: 1
    characteristics: [functional]
    schema_alignment: "owl:equivalentProperty schema:url"
    bfo_ro_relation: "none (literal attribute)"
    notes: >
      Functional. Every article must have a URL — it is the primary
      identifier. Could serve as a key property (HasKey).

  - name: description
    type: DatatypeProperty
    definition: "The description or summary text of an Article"
    domain: Article
    range: xsd:string
    cardinality:
      min: 0
      max: 1
    characteristics: [functional]
    schema_alignment: "owl:equivalentProperty schema:description"
    bfo_ro_relation: "none (literal attribute)"
    notes: >
      Functional. Optional — not all article embeds include description.

  - name: publishedDate
    type: DatatypeProperty
    definition: "The publication date of an Article"
    domain: Article
    range: xsd:dateTime
    cardinality:
      min: 0
      max: 1
    characteristics: [functional]
    schema_alignment: "owl:equivalentProperty schema:datePublished"
    bfo_ro_relation: "none (literal attribute)"
    notes: >
      Functional. Optional — publication date may not always be extractable.

  - name: siteDomain
    type: DatatypeProperty
    definition: "The domain name string of a Publication"
    domain: Publication
    range: xsd:string
    cardinality:
      min: 1
      max: 1
    characteristics: [functional]
    bfo_ro_relation: "none (literal attribute)"
    notes: >
      Functional. Every publication has exactly one domain (e.g.,
      "bloomberg.com", "canarymedia.com"). Serves as the primary identifier
      for publications. Could serve as a key property (HasKey). Renamed from
      "domain" to "siteDomain" to avoid ambiguity with the OWL/RDFS keyword
      "domain" and to follow ISO/IEC 11179 naming clarity guidance.

# --- Key Properties (HasKey candidates) ---

key_properties:
  - class: Article
    keys: [url]
    rationale: "URL uniquely identifies an article across the dataset"

  - class: AuthorAccount
    keys: [handle, onPlatform]
    rationale: "Handle + platform composite key uniquely identifies an author account across platforms"

  - class: Publication
    keys: [siteDomain]
    rationale: "Domain name uniquely identifies a publication"
