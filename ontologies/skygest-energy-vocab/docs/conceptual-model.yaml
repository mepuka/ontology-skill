# Skygest Energy Vocabulary — Conceptual Model
# Phase 3: Conceptualization
# Date: 2026-04-11

namespace: "https://skygest.dev/vocab/energy/"
prefix: sevocab
profile: OWL 2 DL (SKOS-heavy; minimal OWL class axiomatics)

# ─────────────────────────────────────────────────────────────
# Architecture Layers
# ─────────────────────────────────────────────────────────────

layers:
  foundational:
    description: >
      Standard vocabularies used as-is. No project-specific extensions.
    vocabularies:
      - prefix: skos
        role: "Core modeling vocabulary — ConceptScheme, Concept, labels, hierarchy, mapping"
      - prefix: dcterms
        role: "Metadata — source, created, modified"
      - prefix: rdfs
        role: "Labels — rdfs:label, rdfs:comment"
      - prefix: owl
        role: "Ontology header — versionIRI, imports"
      - prefix: xsd
        role: "Datatypes — xsd:string, xsd:date, xsd:anyURI"

  domain_independent:
    description: >
      Reusable provenance pattern applicable beyond the energy domain.
    modules:
      - name: surface-form-provenance
        description: "N-ary relation pattern for per-altLabel provenance tracking"
        classes: [SurfaceFormEntry]
        properties: [hasProvenanceAnnotation, surfaceFormValue, provenance]

  domain_dependent:
    description: >
      Energy-domain concept schemes. Each scheme is a value partition of
      one Variable facet from the skygest-cloudflare resolution kernel.
    modules:
      - name: statistic-type
        scheme: StatisticTypeScheme
        concepts: [Stock, Flow, Price, Share, Count]
        hierarchy: flat
        facet_type: "closed enum (Schema.Literals)"

      - name: aggregation
        scheme: AggregationScheme
        concepts: [Point, EndOfPeriod, Sum, Average, Max, Min, Settlement]
        hierarchy: flat
        facet_type: "closed enum (Schema.Literals)"

      - name: unit-family
        scheme: UnitFamilyScheme
        concepts: [Power, Energy, Currency, CurrencyPerEnergy, MassCo2e, Intensity, Dimensionless, Other]
        hierarchy: flat
        facet_type: "closed enum (Schema.Literals)"

      - name: technology-or-fuel
        scheme: TechnologyOrFuelScheme
        concepts:
          top_level:
            - SolarPv
            - Wind
            - Battery
            - Renewable
            - Nuclear
            - Coal
            - HeatPump
            - Hydrogen
            - NaturalGas
          narrower:
            Wind: [OnshoreWind, OffshoreWind]
            Coal: [BrownCoal]
            NaturalGas: [GasCcgt]
          gap_analysis_expansion:
            - CarbonCapture      # CCS/CCUS/DAC (72 corpus hits)
            - FossilFuel         # Parent concept for coal/gas/oil (113 hits)
            - FuelCell           # SOFC/PEMFC/hydrogen fuel cell
            - Methane            # CH4/fugitive emissions (36 hits)
            - SyntheticFuel      # e-fuel/SAF/synthetic fuel
            - CHP                # Combined heat and power/cogeneration
            - Diesel             # Diesel/fuel oil/heavy fuel oil
        hierarchy: "2-level (skos:broader); only scheme with hierarchy"
        facet_type: "open string (curated canonical list)"

      - name: measured-property
        scheme: MeasuredPropertyScheme
        concepts:
          cold_start_coverage:
            - Generation       # IEA: Production
            - Capacity         # IEA/IRENA: Installed capacity
            - Demand           # IEA: TFC (total final consumption)
            - EmissionsMeasure # IPCC/IEA: GHG emissions
            - Investment       # BNEF/IEA: Capital expenditure
            - PriceMeasure     # Market: Commodity/electricity price
            - ShareMeasure     # IRENA/Ember: Penetration/mix share
            - CountMeasure     # Equipment: Units installed/deployed
          domain_expansion:
            - Trade            # IEA: Imports/exports/trade flows
            - Efficiency       # IEA/IRENA: Conversion/system efficiency
            - Curtailment      # Grid ops: Generation curtailed
            - Revenue          # Market/corporate: Revenue/earnings
            - Discharge        # Storage ops: Discharge/output from storage
            - Consumption      # IEA: TFC (distinct from demand; actual use)
            - Supply           # IEA: TPES (total primary energy supply)
          gap_analysis_expansion:
            - CapacityFactor   # Performance: utilization/load factor
            - Deployment       # Lifecycle: additions/new build/commissioning
            - Decommissioning  # Lifecycle: retirement/phase-out/shutdown
        hierarchy: flat
        facet_type: "open string (curated canonical list)"
        added: "2026-04-12 — SKY-309"
        note: >
          Disambiguates WHAT is being measured. Models the full IEA
          energy statistics space, not just cold-start Variable values.
          Flat hierarchy; concepts are disjoint statistical categories.
          Cross-scheme overlap with StatisticTypeScheme is intentional
          (e.g., "generation" fires both Flow and Generation).

      - name: domain-object
        scheme: DomainObjectScheme
        concepts:
          energy_carriers:
            - Electricity         # IEA: Electricity sector
            - Heat                # IEA: Heat/district heating sector
            - NaturalGasDomain    # IEA: Natural gas as energy carrier
            - HydrogenDomain      # IEA: Hydrogen economy
            - Oil                 # IEA: Petroleum/oil sector
          sectors:
            - Transport           # IEA: Transport sector (EV, mobility)
            - Buildings           # IEA: Buildings/residential energy
            - Industry            # IEA: Industrial energy use
            - EnergyConsumption   # IEA: Aggregate energy consumption
            - EnergyTransition    # Broad: Energy transition investment scope
            - CleanEnergy         # Broad: Clean/green energy aggregate
            - Grid                # Power: Transmission/distribution grid
          technology_domains:
            - BatteryStorage      # Storage: Battery/BESS systems
            - DataCenter          # Infrastructure: Data center power
            - Electrolyzer        # Equipment: Hydrogen electrolyzer
            - HeatPumpDomain      # Equipment: Heat pump systems
            - NuclearReactor      # Equipment: Nuclear reactor
            - SolarPhotovoltaic   # Technology: Solar PV
            - WindTurbine         # Technology: Wind turbine
            - OffshoreWindTurbine # Technology: Offshore wind turbine
            - OffshoreWindFarm    # Installation: Offshore wind farm
            - RenewablePower      # Aggregate: Renewable power generation
          product_specific:
            - LithiumIonBatteryPack  # Product: Li-ion battery pack
            - InterconnectionQueue   # Infrastructure: Grid queue
          gap_analysis_expansion:
            - CarbonMarket           # Market: ETS/carbon credits/offsets
            - EVCharging             # Infrastructure: Charging stations/EVSE
            - Decarbonization        # Broad: Net zero/carbon neutral
            - WholesaleMarket        # Market: Spot/day-ahead/balancing
            - GridReliability        # Grid: Outage/blackout/SAIDI
            - VirtualPowerPlant      # Grid: VPP/aggregator
            - EnergyAccess           # Social: Electrification/access rates
            - EnergyPoverty          # Social: Fuel poverty/affordability
        hierarchy: "2-level optional (skos:broader for related pairs)"
        facet_type: "open string (curated canonical list)"
        added: "2026-04-12 — SKY-309"
        note: >
          Disambiguates WHAT DOMAIN OBJECT is being measured. Models
          the full energy domain — IEA sectors, energy carriers, and
          technology domains — not just cold-start Variable values.
          Organized into four sub-groups: energy carriers, sectors,
          technology domains, and product-specific. Minimal hierarchy:
          OffshoreWindTurbine broader WindTurbine, LithiumIonBatteryPack
          broader BatteryStorage. Significant overlap with
          TechnologyOrFuelScheme is by design (CD-007).

      - name: policy-instrument
        scheme: PolicyInstrumentScheme
        concepts:
          market_mechanisms:
            - EmissionsTrading       # ETS/cap-and-trade (195 corpus hits)
            - CarbonTax              # Carbon levy/fee (9 hits)
            - CarbonCredit           # Carbon offset/VER (3 hits)
            - CapacityMarket         # Capacity auction/payment
            - Auction                # Competitive bidding/tender (51 hits)
          support_mechanisms:
            - FeedInTariff           # FIT/FIP/feed-in premium (87 hits)
            - Subsidy                # Grant/incentive/tax credit
            - NetMetering            # Net billing/self-consumption
            - RenewablePortfolioStd  # RPS/renewable mandate/clean energy standard
          procurement:
            - PowerPurchaseAgreement # PPA/offtake/CPPA (19 hits)
        hierarchy: flat
        facet_type: "open string (curated canonical list)"
        added: "2026-04-12 — gap analysis expansion"
        note: >
          Policy instruments are a distinct dimension — the mechanism
          through which energy is priced, procured, or incentivized.
          Organized into market mechanisms, support mechanisms, and
          procurement. Flat hierarchy. Scope decision resolved: these
          are NOT MeasuredProperty or DomainObject — they are a
          separate facet describing the policy context of a chart.

  problem_specific:
    description: >
      Phase 2 extension for FixedDims frequency. Not consumed by
      the current Stage 2 resolver.
    modules:
      - name: frequency
        scheme: FrequencyScheme
        concepts: [Hourly, Daily, Weekly, Monthly, Quarterly, Annual]
        hierarchy: flat
        priority: "Phase 2 / Could Have"

# ─────────────────────────────────────────────────────────────
# Taxonomy
# ─────────────────────────────────────────────────────────────

taxonomy:
  description: >
    This vocabulary uses SKOS, not OWL class subsumption, for its primary
    structure. All energy concepts are skos:Concept individuals organized
    into skos:ConceptScheme instances. The only OWL class in the project
    ontology is SurfaceFormEntry.

  owl_classes:
    - name: SurfaceFormEntry
      parent: "owl:Thing"
      description: >
        Reified N-ary annotation linking an altLabel string to its
        provenance metadata. One instance per (concept, surfaceForm,
        provenance) tuple.

  skos_concept_schemes:
    - StatisticTypeScheme
    - AggregationScheme
    - UnitFamilyScheme
    - TechnologyOrFuelScheme
    - MeasuredPropertyScheme    # SKY-309
    - DomainObjectScheme        # SKY-309
    - PolicyInstrumentScheme    # Gap analysis expansion
    - FrequencyScheme           # Phase 2

  skos_hierarchy:
    # TechnologyOrFuelScheme hierarchy (existing):
    Wind:
      narrower: [OnshoreWind, OffshoreWind]
    Coal:
      narrower: [BrownCoal]
    NaturalGas:
      narrower: [GasCcgt]
    # DomainObjectScheme hierarchy (new — SKY-309):
    WindTurbine:
      narrower: [OffshoreWindTurbine]
    BatteryStorage:
      narrower: [LithiumIonBatteryPack]

# ─────────────────────────────────────────────────────────────
# Module Boundaries
# ─────────────────────────────────────────────────────────────

modules:
  - file: "skygest-energy-vocab.ttl"
    content: >
      Ontology header, ConceptScheme declarations, all Concept individuals
      with prefLabel/altLabel/definition/inScheme/broader, SurfaceFormEntry
      class and property declarations.
    estimated_triples: "~500-800"

  - file: "skygest-energy-vocab-provenance.ttl"
    content: >
      SurfaceFormEntry A-box individuals — one per (concept, altLabel,
      provenance) tuple. Separated from the main file to keep the T-box
      clean and allow independent provenance updates.
    estimated_triples: "~1500-2400 (3 triples per entry x 500-800 altLabels)"
    note: >
      Consider: this file may be generated by the build script rather
      than hand-maintained. If provenance is tracked only in the JSON
      export (not in RDF), this module can be omitted entirely.

  - file: "mappings/sevocab-to-oeo.sssom.tsv"
    content: "SSSOM mappings to OEO IRIs"

  - file: "mappings/sevocab-to-entsoe.sssom.tsv"
    content: "SSSOM mappings to ENTSO-E PSRType codes"

  - file: "mappings/sevocab-to-wikidata.sssom.tsv"
    content: "SSSOM mappings to Wikidata QIDs"

  - file: "mappings/sevocab-to-qudt.sssom.tsv"
    content: "SSSOM mappings to QUDT quantity kinds"

# ─────────────────────────────────────────────────────────────
# Key Design Decisions
# ─────────────────────────────────────────────────────────────

decisions:
  - id: CD-001
    title: "SKOS individuals, not OWL classes, for energy concepts"
    rationale: >
      The Worker consumes flat JSON, not OWL class expressions. The
      concepts are reference-data entries in a lookup table, not types
      that will be instantiated or reasoned over. SKOS individuals give
      us labels, hierarchy, and mapping without OWL overhead.

  - id: CD-002
    title: "Single OWL class: SurfaceFormEntry"
    rationale: >
      The N-ary provenance pattern requires one reified class. All other
      modeling is pure SKOS. This keeps the OWL footprint minimal and
      avoids anti-pattern #14 (system blueprint instead of domain model).

  - id: CD-003
    title: "Provenance in RDF vs JSON-only"
    rationale: >
      CQ-012 through CQ-014 and CQ-028 require SPARQL-queryable
      provenance. Therefore provenance must be in RDF, not only in the
      JSON export. However, the provenance A-box module may be build-script
      generated to avoid dual maintenance.
    status: "Architect to decide implementation strategy"

  - id: CD-004
    title: "prefLabel values match TypeScript canonical strings"
    rationale: >
      The prefLabel of each concept must exactly match the canonical
      string value expected by the TypeScript Schema.Literals enum (for
      closed facets) or the curated canonical list (for technologyOrFuel).
      E.g., prefLabel "stock", not "Stock" — lowercase to match the enum.
    implication: >
      This means prefLabel does not follow the naming convention of
      lowercase-unless-proper-noun literally — the canonical strings
      use snake_case for compound values (e.g., "end_of_period",
      "currency_per_energy", "mass_co2e"). The concept IRI uses
      CamelCase (e.g., sevocab:EndOfPeriod) but prefLabel matches the
      TypeScript string.

  - id: CD-006
    title: "Cross-scheme composition semantics live in the kernel, not the ontology"
    rationale: >
      The three-way relationship TechnologyOrFuel × MeasuredProperty ×
      DomainObject defines a unique Variable (e.g., solar PV × generation
      × electricity = "Solar electricity generation"). This composition is
      a product-code concern — the Stage 2 kernel assembles a partial
      Variable shape from independently-matched facets, then scores
      candidates. The ontology does NOT model this composition as OWL
      axioms (no n-ary relation, no qualified restrictions across schemes).
      Each scheme is an independent SKOS vocabulary with its own JSON
      export. The kernel composes them.
    implication: >
      skos:related is NOT used between concepts in different schemes
      (e.g., Generation and Electricity are not skos:related). This avoids
      over-modeling and keeps each scheme independent. The composition
      semantics are documented here and enforced by product-code tests.

  - id: CD-007
    title: "DomainObject overlaps with TechnologyOrFuel by design"
    rationale: >
      DomainObjectScheme concepts like "solar photovoltaic", "wind turbine",
      and "battery storage" deliberately overlap with TechnologyOrFuelScheme.
      This is correct because domainObject captures WHAT is being measured
      (the object receiving the measurement) while technologyOrFuel captures
      WHAT TECHNOLOGY is producing/converting. Example: "Solar electricity
      generation" has technologyOrFuel=solar PV AND domainObject=electricity
      (the generated product, not the technology). A Variable like "Installed
      solar PV capacity" has technologyOrFuel=solar PV AND domainObject=
      solar photovoltaic (the technology IS the measured object).
    implication: >
      Surface forms for DomainObject should be DISTINCT from TechnologyOrFuel
      surface forms where possible. "solar" fires technologyOrFuel; "solar
      photovoltaic" or "PV installations" could fire domainObject. But for
      some concepts (e.g., "electricity"), domainObject has exclusive surface
      forms not present in TechnologyOrFuelScheme.

  - id: CD-008
    title: "MeasuredProperty concept names use suffixed disambiguation"
    rationale: >
      Three MeasuredProperty concepts overlap in name with StatisticType
      concepts: price, share, count. To avoid IRI collision in the Turtle
      file (sevocab:Price is already the StatisticType concept), the
      MeasuredProperty concepts use suffixed IRIs: PriceMeasure,
      ShareMeasure, CountMeasure. The prefLabel still matches the cold-start
      canonical string: "price", "share", "count".
    implication: >
      The architect must use IRI sevocab:PriceMeasure with
      skos:prefLabel "price"@en. This follows CD-004 (prefLabel matches
      TypeScript canonical string).

  - id: CD-005
    title: "TechnologyOrFuel hierarchy is max 2 levels"
    rationale: >
      The resolver does exact and Jaccard-fuzzy matching, not transitive
      hierarchy traversal. Deeper hierarchies add no resolver value and
      complicate the build script. If a child concept matches, its
      canonical value is returned directly (e.g., "offshore_wind"), not
      its parent ("wind").
