# Conceptual Model: DCAT Structural Extension
# Extends skygest-energy-vocab with structural layer

# =============================================================================
# Architecture Layer: Domain-dependent (builds on W3C standards)
# Module: Structural Model (single module — under 15 new entities)
# =============================================================================

module:
  name: structural-model
  layer: domain-dependent
  description: >
    Structural layer bridging sevocab vocabulary schemes with DCAT catalog
    entities and W3C Data Cube dimensional model. Declares how facet
    dimensions compose into statistical variables and how variables relate
    to datasets and agents.
  lives_in: skygest-energy-vocab.ttl (additive extension)

# =============================================================================
# Class Hierarchy (Middle-Out)
# =============================================================================

classes:
  # Middle layer — the 3 domain classes that stakeholders talk about
  - name: EnergyVariable
    parent: schema:StatisticalVariable
    definition: >
      A statistical variable that is composed of up to seven facet
      dimensions drawn from sevocab concept schemes.
    label: "energy variable"
    source_cqs: [CQ-054, CQ-057, CQ-063, CQ-067]
    disjoint_with: [EnergyDataset, EnergyAgent, Series]
    notes: >
      Central entity for the resolution kernel. Composition is modeled
      via OWL restrictions on 7 facet dimension properties, each with
      maxQualifiedCardinality 1.

  - name: EnergyDataset
    parent: dcat:Dataset
    definition: >
      A DCAT dataset that contains one or more energy variables and is
      published by an energy agent.
    label: "energy dataset"
    source_cqs: [CQ-058, CQ-059, CQ-061, CQ-065, CQ-066]
    disjoint_with: [EnergyVariable, EnergyAgent, Series]
    notes: >
      Structural container. Links to Variables via the higher-level
      sevocab:hasVariable view, and to concrete published realizations via
      sevocab:hasSeries (Dataset → Series → Variable). Links to
      Distributions via dcat:distribution and to Agents via dct:publisher.

  - name: EnergyAgent
    parent: foaf:Agent
    definition: >
      A FOAF agent that publishes one or more energy datasets.
    label: "energy agent"
    source_cqs: [CQ-058, CQ-060, CQ-062]
    disjoint_with: [EnergyVariable, EnergyDataset, Series]
    notes: >
      Publisher entity. The resolution kernel uses Agent identity for
      structural disambiguation.

  - name: Series
    parent: null
    definition: >
      A concrete published series that implements exactly one EnergyVariable
      within exactly one EnergyDataset's reporting context.
    label: "series"
    source_cqs: []  # TBD in SKY-318 (Series competency questions)
    disjoint_with: [EnergyVariable, EnergyDataset, EnergyAgent]
    notes: >
      Structural node on the Dataset → Series → Variable path. Linked to
      exactly one Variable via sevocab:implementsVariable (owl:FunctionalProperty)
      and to exactly one Dataset via sevocab:publishedInDataset
      (owl:FunctionalProperty, owl:inverseOf sevocab:hasSeries).

      Naming disambiguation: sevocab:Series is NOT dcat:DatasetSeries
      (which groups dataset editions in DCAT 3) and is distinct from the
      pre-existing 'dataset-series' family concepts used elsewhere in the
      Skygest runtime data (dataset-series/dser_* references). Those name
      publisher-side dataset groupings; sevocab:Series names the
      Variable-implementing record a dataset exposes.

      Scope cuts in this slice: no qb:Slice subclassing, no
      qb:dataSet subproperty, no Distribution → Series linkage, and
      fixed-dimension bag semantics (place/market/frequency) are
      deferred. An EnergyDataset with zero Series is explicitly legal
      in this slice — no hasSeries someValuesFrom restriction is added.

# =============================================================================
# Named Individuals
# =============================================================================

individuals:
  - name: EnergyVariableStructure
    type: qb:DataStructureDefinition
    definition: >
      The data structure definition declaring the seven facet dimensions
      that compose an energy variable.
    label: "energy variable structure"
    source_cqs: [CQ-054, CQ-068]
    components:
      - dimension: measuredProperty
      - dimension: domainObject
      - dimension: technologyOrFuel
      - dimension: statisticType
      - dimension: aggregation
      - dimension: unitFamily
      - dimension: policyInstrument

  # 7 Dimension Properties (instances of qb:DimensionProperty)
  - name: measuredProperty
    type: qb:DimensionProperty
    codeList: sevocab:MeasuredPropertyScheme
    definition: "The physical or economic quantity being measured."
    label: "measured property"

  - name: domainObject
    type: qb:DimensionProperty
    codeList: sevocab:DomainObjectScheme
    definition: "The entity or system the measurement is about."
    label: "domain object"

  - name: technologyOrFuel
    type: qb:DimensionProperty
    codeList: sevocab:TechnologyOrFuelScheme
    definition: "The energy technology or fuel type."
    label: "technology or fuel"

  - name: statisticType
    type: qb:DimensionProperty
    codeList: sevocab:StatisticTypeScheme
    definition: "The kind of statistical measure."
    label: "statistic type"

  - name: aggregation
    type: qb:DimensionProperty
    codeList: sevocab:AggregationScheme
    definition: "The temporal aggregation method."
    label: "aggregation"

  - name: unitFamily
    type: qb:DimensionProperty
    codeList: sevocab:UnitFamilyScheme
    definition: "The family of measurement units."
    label: "unit family"

  - name: policyInstrument
    type: qb:DimensionProperty
    codeList: sevocab:PolicyInstrumentScheme
    definition: "The policy mechanism involved."
    label: "policy instrument"

# =============================================================================
# Relationships (visual summary)
# =============================================================================
#
#   EnergyAgent
#       ^
#       | dct:publisher
#       |
#   EnergyDataset ----dcat:distribution----> dcat:Distribution
#       |
#       | hasVariable (higher-level denormalized view)
#       |
#       | hasSeries (structural path — functional via publishedInDataset)
#       v
#   Series
#       |
#       | implementsVariable (owl:FunctionalProperty)
#       v
#   EnergyVariable
#       |-- measuredProperty ----> [MeasuredPropertyScheme concept]
#       |-- domainObject --------> [DomainObjectScheme concept]
#       |-- technologyOrFuel ----> [TechnologyOrFuelScheme concept]
#       |-- statisticType -------> [StatisticTypeScheme concept]
#       |-- aggregation ---------> [AggregationScheme concept]
#       |-- unitFamily ----------> [UnitFamilyScheme concept]
#       |-- policyInstrument ----> [PolicyInstrumentScheme concept]
#
# hasVariable remains asserted as the higher-level denormalized view.
# SPARQL consumers should traverse hasSeries + implementsVariable
# explicitly — simple entailment does not compute OWL property chains.
#
