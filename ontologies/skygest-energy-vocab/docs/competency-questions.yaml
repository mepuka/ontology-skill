    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?surfaceForm ?provenance WHERE {
        ?concept sevocab:hasProvenanceAnnotation ?anno .
        ?anno sevocab:surfaceFormValue ?surfaceForm ;
              sevocab:provenance ?provenance .
        FILTER(?provenance IN ("agent-curated", "eval-feedback"))
        FILTER NOT EXISTS { ?anno skos:note ?note }
      }
    expected_result: empty
    required_classes: []
    required_properties:
      - "sevocab:hasProvenanceAnnotation"
      - "sevocab:provenance"
      - "skos:note"
    required_axioms: []
    note: >
      Mirrors the validateSurfaceFormEntry constraint in
      skygest-cloudflare/src/domain/surfaceForm.ts (lines 43-58):
      notes must be non-empty when provenance is agent-curated or
      eval-feedback. The JSON export build must also enforce this.

