  # ──────────────────────────────────────────────────────────
  # Resolution Kernel Constraints (product-code alignment)
  # ──────────────────────────────────────────────────────────

  - id: CQ-026
    source_use_case: UC-001
    natural_language: "Are there any normalized surface form collisions within a single ConceptScheme (two different canonical values claiming the same normalizedSurfaceForm)?"
    type: constraint
    priority: must_have
    sample_answer:
      - result: "empty (no collisions — buildVocabularyIndex would not raise VocabularyCollisionError)"
    derivation_method: inference
    out_of_scope:
      - "Cross-scheme collisions (same normalizedSurfaceForm in different schemes is allowed)"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?scheme ?surfaceForm ?concept1 ?concept2 WHERE {
        ?concept1 skos:altLabel ?surfaceForm ;
                  skos:inScheme ?scheme .
        ?concept2 skos:altLabel ?surfaceForm ;
                  skos:inScheme ?scheme .
        FILTER(?concept1 < ?concept2)
      }
    expected_result: empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
      - "skos:inScheme"
    required_axioms: []
    note: >
      This is the RDF-level approximation of the VocabularyCollisionError
      constraint in buildVocabularyIndex(). The actual runtime collision
      check uses normalizedSurfaceForm (NFKC + lowercase + whitespace
      collapse), so the build script must also verify normalized forms.
      This SPARQL query catches exact-string collisions; the build script
      must catch normalization-equivalent collisions.

  - id: CQ-027
    source_use_case: UC-001
    natural_language: "Does the build script produce normalizedSurfaceForm values consistent with normalizeLookupText()?"
    type: constraint
    priority: must_have
    sample_answer:
      - result: "All normalizedSurfaceForm values match NFKC + lowercase + whitespace-collapse of surfaceForm"
    derivation_method: external_join
    out_of_scope: []
    sparql: |
      # This constraint cannot be fully expressed in SPARQL because SPARQL
      # lacks a NFKC normalization function. The build script
      # (scripts/build.py) must enforce this invariant by computing
      # normalizeLookupText(surfaceForm) for every altLabel and comparing
      # against the emitted normalizedSurfaceForm in the JSON export.
      #
      # Approximate SPARQL check (lowercase + no leading/trailing whitespace):
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?concept ?surfaceForm WHERE {
        ?concept skos:altLabel ?surfaceForm .
        FILTER(
          ?surfaceForm != LCASE(?surfaceForm) &&
          LANG(?surfaceForm) = "en"
        )
      }
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
    required_axioms: []
    note: >
      This CQ is primarily a build-script constraint, not a pure SPARQL
      test. The SPARQL query is an approximation that flags English
      altLabels with uppercase characters (which is expected — e.g., "GW",
      "CCGT", "BESS"). The real test lives in scripts/build.py and
      validates that every JSON row's normalizedSurfaceForm ==
      normalizeLookupText(surfaceForm). The test_ontology.py suite should
      include a Python-level test for this.

  - id: CQ-028
    source_use_case: UC-003
    natural_language: "Do all surface form entries with provenance 'agent-curated' or 'eval-feedback' have a non-empty notes field?"
    type: constraint
    priority: must_have
    sample_answer:
