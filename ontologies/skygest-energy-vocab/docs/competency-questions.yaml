  - id: CQ-053
    source_use_case: UC-011
    natural_language: "Does every active concept have at least 3 English surface forms?"
    type: constraint
    priority: should_have
    derivation_method: aggregation
    out_of_scope: ["FrequencyScheme (Phase 2)"]
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?label (COUNT(?alt) AS ?n) WHERE {
        ?concept skos:inScheme ?s ; skos:prefLabel ?label ; skos:altLabel ?alt .
        FILTER(LANG(?alt) = "en")
        FILTER(?s != sevocab:FrequencyScheme)
      }
      GROUP BY ?concept ?label
      HAVING (COUNT(?alt) < 3)
    expected_result: empty
    required_classes: []
    required_properties: ["skos:altLabel"]
    required_axioms: []
    note: "Quality gate — concepts with <3 EN surface forms unlikely to match diverse chart text."
