# Skygest Energy Vocabulary — Competency Questions
# Derived from: docs/scope.md, docs/use-cases.yaml
# Date: 2026-04-11
# Namespace prefix: sevocab: https://skygest.dev/vocab/energy/

competency_questions:

  # ──────────────────────────────────────────────────────────
  # Facet Lookup (UC-001, UC-007)
  # ──────────────────────────────────────────────────────────

  - id: CQ-001
    source_use_case: UC-001
    natural_language: "What are all concepts in a given ConceptScheme?"
    type: enumerative
    priority: must_have
    sample_answer:
      - concept: "sevocab:Stock"
        label: "stock"
        scheme: "sevocab:StatisticTypeScheme"
      - concept: "sevocab:Flow"
        label: "flow"
        scheme: "sevocab:StatisticTypeScheme"
    derivation_method: direct_lookup
    out_of_scope:
      - "Concepts from external ontologies not imported into the vocabulary"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?label WHERE {
        ?concept skos:inScheme ?scheme ;
                 skos:prefLabel ?label .
      }
      ORDER BY ?label
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:inScheme"
      - "skos:prefLabel"
    required_axioms: []

  - id: CQ-002
    source_use_case: UC-001
    natural_language: "What canonical concept does a given surface form map to?"
    type: relational
    priority: must_have
    sample_answer:
      - surface_form: "installed capacity"
        concept: "sevocab:Stock"
        scheme: "sevocab:StatisticTypeScheme"
    derivation_method: direct_lookup
    out_of_scope:
      - "Fuzzy or embedding-based matching (Stage 2.5)"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?scheme WHERE {
        ?concept skos:altLabel "installed capacity"@en ;
                 skos:inScheme ?scheme .
      }
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
      - "skos:inScheme"
    required_axioms: []

  - id: CQ-003
    source_use_case: UC-001
    natural_language: "What surface forms (altLabels) exist for a given canonical concept?"
    type: enumerative
    priority: must_have
    sample_answer:
      - concept: "sevocab:SolarPv"
        surface_forms:
          - "solar"
          - "solar PV"
          - "PV"
          - "photovoltaic"
          - "Solarenergie"
          - "Photovoltaik"
    derivation_method: direct_lookup
    out_of_scope:
      - "Surface forms in languages other than English and German"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?surfaceForm ?lang WHERE {
        sevocab:SolarPv skos:altLabel ?surfaceForm .
        BIND(LANG(?surfaceForm) AS ?lang)
      }
      ORDER BY ?lang ?surfaceForm
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
    required_axioms: []

  - id: CQ-004
    source_use_case: UC-001
    natural_language: "Which ConceptScheme does a given concept belong to?"
    type: relational
    priority: must_have
    sample_answer:
      - concept: "sevocab:Power"
        scheme: "sevocab:UnitFamilyScheme"
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?scheme WHERE {
        sevocab:Power skos:inScheme ?scheme .
      }
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:inScheme"
    required_axioms: []

  - id: CQ-005
    source_use_case: UC-007
    natural_language: "What German surface forms exist for a given concept?"
    type: enumerative
    priority: must_have
    sample_answer:
      - concept: "sevocab:Wind"
        german_forms:
          - "Windenergie"
          - "Windkraft"
    derivation_method: direct_lookup
    out_of_scope:
      - "Languages other than German"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?surfaceForm WHERE {
        ?concept skos:altLabel ?surfaceForm .
        FILTER(LANG(?surfaceForm) = "de")
      }
      ORDER BY ?concept ?surfaceForm
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
    required_axioms: []

  # ──────────────────────────────────────────────────────────
  # Disambiguation / Discrimination (UC-002)
  # ──────────────────────────────────────────────────────────

  - id: CQ-006
    source_use_case: UC-002
    natural_language: "Which concepts share the same surface form (ambiguous altLabels)?"
    type: relational
    priority: must_have
    sample_answer:
      - surface_form: "total"
        concepts:
          - { concept: "sevocab:Stock", scheme: "sevocab:StatisticTypeScheme" }
          - { concept: "sevocab:Sum", scheme: "sevocab:AggregationScheme" }
    derivation_method: direct_lookup
    out_of_scope:
      - "Cross-language ambiguity (same form in English and German meaning different things)"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?surfaceForm ?concept1 ?concept2 ?scheme1 ?scheme2 WHERE {
        ?concept1 skos:altLabel ?surfaceForm ;
                  skos:inScheme ?scheme1 .
        ?concept2 skos:altLabel ?surfaceForm ;
                  skos:inScheme ?scheme2 .
        FILTER(?concept1 < ?concept2)
      }
      ORDER BY ?surfaceForm
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
      - "skos:inScheme"
    required_axioms: []

  - id: CQ-007
    source_use_case: UC-002
    natural_language: "What surface forms distinguish 'stock' from 'flow' in the StatisticTypeScheme?"
    type: relational
    priority: must_have
    sample_answer:
      - stock_only: ["installed", "cumulative", "nameplate", "Kapazitat"]
        flow_only: ["generation", "output", "Erzeugung", "Stromerzeugung"]
    derivation_method: inference
    out_of_scope:
      - "Contextual disambiguation beyond surface form matching"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?surfaceForm WHERE {
        VALUES ?concept { sevocab:Stock sevocab:Flow }
        ?concept skos:altLabel ?surfaceForm .
        FILTER NOT EXISTS {
          VALUES ?other { sevocab:Stock sevocab:Flow }
          ?other skos:altLabel ?surfaceForm .
          FILTER(?other != ?concept)
        }
      }
      ORDER BY ?concept ?surfaceForm
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
    required_axioms: []

  - id: CQ-008
    source_use_case: UC-002
    natural_language: "Which unitFamily concept does the surface form 'GW' resolve to, and does that discriminate capacity from generation?"
    type: relational
    priority: must_have
    sample_answer:
      - surface_form: "GW"
        concept: "sevocab:Power"
        implication: "power unit -> capacity (stock), not generation (flow)"
    derivation_method: inference
    out_of_scope:
      - "Multi-step reasoning combining unitFamily + statisticType"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?scheme WHERE {
        ?concept skos:altLabel "GW"@en ;
                 skos:inScheme ?scheme .
      }
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
      - "skos:inScheme"
    required_axioms: []

  # ──────────────────────────────────────────────────────────
  # Hierarchy and Structure (UC-001, UC-002)
  # ──────────────────────────────────────────────────────────

  - id: CQ-009
    source_use_case: UC-001
    natural_language: "What are the narrower concepts of a given technology concept?"
    type: enumerative
    priority: must_have
    sample_answer:
      - broader: "sevocab:Wind"
        narrower:
          - "sevocab:OnshoreWind"
          - "sevocab:OffshoreWind"
    derivation_method: direct_lookup
    out_of_scope:
      - "Transitive closure of broader/narrower chains beyond one level"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?narrower ?label WHERE {
        ?narrower skos:broader sevocab:Wind ;
                  skos:prefLabel ?label .
      }
      ORDER BY ?label
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:broader"
      - "skos:prefLabel"
    required_axioms: []

  - id: CQ-010
    source_use_case: UC-002
    natural_language: "Is a given concept a narrower term of another concept?"
    type: boolean
    priority: should_have
    sample_answer:
      - child: "sevocab:OffshoreWind"
        parent: "sevocab:Wind"
        result: true
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      ASK {
        sevocab:OffshoreWind skos:broader sevocab:Wind .
      }
    expected_result: "true"
    required_classes: []
    required_properties:
      - "skos:broader"
    required_axioms: []

  - id: CQ-011
    source_use_case: UC-001
    natural_language: "What are all five ConceptSchemes in the vocabulary?"
    type: enumerative
    priority: must_have
    sample_answer:
      - schemes:
          - "sevocab:StatisticTypeScheme"
          - "sevocab:AggregationScheme"
          - "sevocab:UnitFamilyScheme"
          - "sevocab:TechnologyOrFuelScheme"
          - "sevocab:FrequencyScheme"
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?scheme ?label WHERE {
        ?scheme a skos:ConceptScheme ;
                skos:prefLabel ?label .
      }
      ORDER BY ?label
    expected_result: non_empty
    required_classes:
      - "skos:ConceptScheme"
    required_properties:
      - "skos:prefLabel"
    required_axioms: []

  # ──────────────────────────────────────────────────────────
  # Provenance and Evidence (UC-003, UC-004)
  # ──────────────────────────────────────────────────────────

  - id: CQ-012
    source_use_case: UC-003
    natural_language: "What is the provenance of a given surface form entry?"
    type: relational
    priority: must_have
    sample_answer:
      - concept: "sevocab:SolarPv"
        surface_form: "photovoltaic"
        provenance: "oeo-derived"
        note: "Harvested from OEO v2.11.0 obo:OEO_00010379 rdfs:label"
    derivation_method: direct_lookup
    out_of_scope:
      - "Full provenance chains back to original data source"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      PREFIX dcterms: <http://purl.org/dc/terms/>
      SELECT ?concept ?surfaceForm ?provenance ?note WHERE {
        ?concept skos:altLabel ?surfaceForm .
        ?concept sevocab:hasProvenanceAnnotation ?anno .
        ?anno sevocab:surfaceFormValue ?surfaceForm ;
              sevocab:provenance ?provenance .
        OPTIONAL { ?anno skos:note ?note }
      }
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "sevocab:hasProvenanceAnnotation"
      - "sevocab:surfaceFormValue"
      - "sevocab:provenance"
    required_axioms: []
    note: >
      Provenance tracking at the individual altLabel level may require
      reification or a separate annotation structure. The architect phase
      must decide between: (a) RDF-star annotation on the altLabel triple,
      (b) a SurfaceFormEntry individual per altLabel, or (c) provenance
      only in the JSON export (not in RDF). Option (b) is most SPARQL-friendly.

  - id: CQ-013
    source_use_case: UC-004
    natural_language: "Which surface forms were added from eval feedback?"
    type: enumerative
    priority: should_have
    sample_answer:
      - surface_form: "Nettostromerzeugung"
        concept: "sevocab:Flow"
        provenance: "eval-feedback"
        note: "Added after eval-037 false negative on energy-charts.info post"
    derivation_method: direct_lookup
    out_of_scope:
      - "Tracking which specific eval post triggered the addition"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?surfaceForm ?note WHERE {
        ?concept sevocab:hasProvenanceAnnotation ?anno .
        ?anno sevocab:surfaceFormValue ?surfaceForm ;
              sevocab:provenance "eval-feedback" .
        OPTIONAL { ?anno skos:note ?note }
      }
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "sevocab:hasProvenanceAnnotation"
      - "sevocab:provenance"
    required_axioms: []

  - id: CQ-014
    source_use_case: UC-003
    natural_language: "Which surface forms for a concept were derived from a specific external source?"
    type: enumerative
    priority: should_have
    sample_answer:
      - concept: "sevocab:SolarPv"
        source: "oeo-derived"
        surface_forms: ["photovoltaic", "photovoltaic power plant"]
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?surfaceForm WHERE {
        ?concept sevocab:hasProvenanceAnnotation ?anno .
        ?anno sevocab:surfaceFormValue ?surfaceForm ;
              sevocab:provenance "oeo-derived" .
      }
      ORDER BY ?concept ?surfaceForm
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "sevocab:hasProvenanceAnnotation"
      - "sevocab:provenance"
    required_axioms: []

  # ──────────────────────────────────────────────────────────
  # Coverage and Quality (UC-004, UC-005)
  # ──────────────────────────────────────────────────────────

  - id: CQ-015
    source_use_case: UC-005
    natural_language: "Which concepts have no surface forms (altLabels) at all?"
    type: enumerative
    priority: must_have
    sample_answer:
      - result: "empty result set (all concepts should have at least one altLabel)"
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?concept ?label ?scheme WHERE {
        ?concept skos:inScheme ?scheme ;
                 skos:prefLabel ?label .
        FILTER NOT EXISTS { ?concept skos:altLabel ?any }
      }
    expected_result: empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
      - "skos:inScheme"
    required_axioms: []

  - id: CQ-016
    source_use_case: UC-005
    natural_language: "Which concepts in TechnologyOrFuelScheme lack German surface forms?"
    type: enumerative
    priority: should_have
    sample_answer:
      - concepts_missing_german: ["sevocab:HeatPump", "sevocab:Hydrogen"]
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?label WHERE {
        ?concept skos:inScheme sevocab:TechnologyOrFuelScheme ;
                 skos:prefLabel ?label .
        FILTER NOT EXISTS {
          ?concept skos:altLabel ?de .
          FILTER(LANG(?de) = "de")
        }
      }
      ORDER BY ?label
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
      - "skos:inScheme"
    required_axioms: []

  - id: CQ-017
    source_use_case: UC-005
    natural_language: "How many surface forms does each concept have?"
    type: quantitative
    priority: should_have
    sample_answer:
      - concept: "sevocab:SolarPv"
        count: 6
      - concept: "sevocab:Stock"
        count: 4
    derivation_method: aggregation
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?concept ?label (COUNT(?alt) AS ?altCount) WHERE {
        ?concept skos:inScheme ?scheme ;
                 skos:prefLabel ?label ;
                 skos:altLabel ?alt .
      }
      GROUP BY ?concept ?label
      ORDER BY DESC(?altCount)
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:altLabel"
    required_axioms: []

  - id: CQ-018
    source_use_case: UC-005
    natural_language: "How many concepts exist per ConceptScheme?"
    type: quantitative
    priority: must_have
    sample_answer:
      - scheme: "sevocab:StatisticTypeScheme"
        count: 5
      - scheme: "sevocab:TechnologyOrFuelScheme"
        count: 45
    derivation_method: aggregation
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?scheme ?schemeLabel (COUNT(?concept) AS ?conceptCount) WHERE {
        ?scheme a skos:ConceptScheme ;
                skos:prefLabel ?schemeLabel .
        ?concept skos:inScheme ?scheme .
      }
      GROUP BY ?scheme ?schemeLabel
      ORDER BY ?schemeLabel
    expected_result: non_empty
    required_classes:
      - "skos:ConceptScheme"
    required_properties:
      - "skos:inScheme"
    required_axioms: []

  # ──────────────────────────────────────────────────────────
  # Cross-Ontology Alignment (UC-006)
  # ──────────────────────────────────────────────────────────

  - id: CQ-019
    source_use_case: UC-006
    natural_language: "What OEO concept is a given TechnologyOrFuel concept mapped to?"
    type: relational
    priority: should_have
    sample_answer:
      - concept: "sevocab:SolarPv"
        mapping: "skos:closeMatch"
        target: "obo:OEO_00010379"
        target_label: "photovoltaic power plant"
    derivation_method: direct_lookup
    out_of_scope:
      - "Mappings to ontologies not listed in scope (e.g., DBpedia)"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?mappingProp ?target WHERE {
        ?concept skos:inScheme sevocab:TechnologyOrFuelScheme .
        VALUES ?mappingProp {
          skos:exactMatch skos:closeMatch skos:broadMatch skos:narrowMatch
        }
        ?concept ?mappingProp ?target .
        FILTER(STRSTARTS(STR(?target), "http://purl.obolibrary.org/obo/OEO_"))
      }
      ORDER BY ?concept
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:closeMatch"
    required_axioms: []

  - id: CQ-020
    source_use_case: UC-006
    natural_language: "What QUDT unit does a given UnitFamily concept relate to?"
    type: relational
    priority: should_have
    sample_answer:
      - concept: "sevocab:Power"
        mapping: "skos:closeMatch"
        targets: ["qudt:GigaW", "qudt:MegaW"]
    derivation_method: direct_lookup
    out_of_scope:
      - "Full QUDT unit hierarchy"
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX sevocab: <https://skygest.dev/vocab/energy/>
      SELECT ?concept ?mappingProp ?target WHERE {
        ?concept skos:inScheme sevocab:UnitFamilyScheme .
        VALUES ?mappingProp {
          skos:exactMatch skos:closeMatch skos:broadMatch
        }
        ?concept ?mappingProp ?target .
        FILTER(STRSTARTS(STR(?target), "http://qudt.org/"))
      }
      ORDER BY ?concept
    expected_result: non_empty
    required_classes: []
    required_properties:
      - "skos:closeMatch"
    required_axioms: []

  - id: CQ-021
    source_use_case: UC-006
    natural_language: "Which vocabulary concepts have no external mappings?"
    type: enumerative
    priority: should_have
    sample_answer:
      - unmapped: ["sevocab:Point", "sevocab:Settlement"]
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?concept ?label ?scheme WHERE {
        ?concept skos:inScheme ?scheme ;
                 skos:prefLabel ?label .
        FILTER NOT EXISTS {
          VALUES ?mappingProp {
            skos:exactMatch skos:closeMatch skos:broadMatch skos:narrowMatch
          }
          ?concept ?mappingProp ?target .
        }
      }
      ORDER BY ?scheme ?label
    expected_result: non_empty
    required_classes: []
    required_properties: []
    required_axioms: []

  # ──────────────────────────────────────────────────────────
  # JSON Export Integrity (UC-001, UC-003)
  # ──────────────────────────────────────────────────────────

  - id: CQ-022
    source_use_case: UC-001
    natural_language: "Does every concept with altLabels have a prefLabel that serves as the canonical value?"
    type: constraint
    priority: must_have
    sample_answer:
      - result: "empty (no violations — every concept with altLabels has a prefLabel)"
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?concept WHERE {
        ?concept skos:altLabel ?alt ;
                 skos:inScheme ?scheme .
        FILTER NOT EXISTS { ?concept skos:prefLabel ?pref }
      }
    expected_result: empty
    required_classes: []
    required_properties:
      - "skos:prefLabel"
      - "skos:altLabel"
    required_axioms: []

  - id: CQ-023
    source_use_case: UC-001
    natural_language: "Does every concept belong to exactly one ConceptScheme?"
    type: constraint
    priority: must_have
    sample_answer:
      - result: "empty (no concept belongs to zero or multiple schemes)"
    derivation_method: inference
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?concept (COUNT(?scheme) AS ?schemeCount) WHERE {
        ?concept a skos:Concept ;
                 skos:inScheme ?scheme .
      }
      GROUP BY ?concept
      HAVING (COUNT(?scheme) != 1)
    expected_result: empty
    required_classes:
      - "skos:Concept"
    required_properties:
      - "skos:inScheme"
    required_axioms: []

  - id: CQ-024
    source_use_case: UC-003
    natural_language: "Does every concept have an rdfs:label and skos:definition?"
    type: constraint
    priority: must_have
    sample_answer:
      - result: "empty (no violations)"
    derivation_method: direct_lookup
    out_of_scope: []
    sparql: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?concept WHERE {
        ?concept skos:inScheme ?scheme .
        FILTER(
          !EXISTS { ?concept rdfs:label ?l } ||
          !EXISTS { ?concept skos:definition ?d }
        )
      }
    expected_result: empty
    required_classes: []
    required_properties:
      - "rdfs:label"
      - "skos:definition"
    required_axioms: []

  # ──────────────────────────────────────────────────────────
  # Relationship to Existing Ontologies (UC-006)
  # ──────────────────────────────────────────────────────────

  - id: CQ-025
    source_use_case: UC-006
    natural_language: "What energy-news topic does a TechnologyOrFuel concept map to via broadMatch?"
    type: relational
    priority: could_have
    sample_answer:
      - concept: "sevocab:SolarPv"
        mapping: "skos:broadMatch"
        target: "enews:Solar"
