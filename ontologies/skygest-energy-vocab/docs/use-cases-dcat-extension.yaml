# Use Cases: DCAT Structural Extension
# These use cases drive CQ elicitation for the structural layer.

- id: UC-DM-001
  name: "Compose a Variable from matched facets"
  actor: "Stage 2 resolution kernel"
  goal: "Build a partial or complete EnergyVariable from surface-form facet matches"
  preconditions:
    - "Surface form matching has produced 1+ facet hits (e.g., measuredProperty=Price, technologyOrFuel=NaturalGas)"
    - "The ontology declares which dimensions compose an EnergyVariable"
  main_flow:
    - "Kernel receives matched facets from vocabulary lookup"
    - "Kernel queries the ontology for the dimensional structure of EnergyVariable"
    - "Kernel creates a partial Variable shape with the matched dimensions filled in"
    - "Kernel checks which registered Variables match the partial shape"
  postconditions:
    - "A candidate set of Variables matching the partial shape is produced"
  related_cqs: []
  priority: must_have

- id: UC-DM-002
  name: "Disambiguate tied candidates via DCAT traversal"
  actor: "Stage 2 resolution kernel"
  goal: "Break ties between candidates that match on the same number of facets"
  preconditions:
    - "2+ candidate Variables tied on matched facet count"
    - "The ontology declares which Dataset each Variable is published in (via Series → Dataset) and which Agent published that Dataset"
  main_flow:
    - "Kernel identifies the tied candidates"
    - "Kernel traverses Variable ← Series → Dataset → Agent for each candidate (via implementsVariable inverse and publishedInDataset, then dct:publisher)"
    - "Kernel checks whether the post context (source URL, author) matches any Agent"
    - "Kernel uses Agent match as a structural disambiguation signal"
  postconditions:
    - "Tied candidates are scored with structural context, reducing or eliminating ties"
  related_cqs: []
  priority: must_have
  notes: >
    The traversal runs on the explicit Series-backed path rather than
    hasVariable, because hasVariable is retained only as a higher-level
    view; the structural source of truth is the Dataset → Series →
    Variable chain added in SKY-316.

- id: UC-DM-003
  name: "Validate a Variable's facet completeness"
  actor: "Data curator"
  goal: "Check whether a registry Variable has all required facet dimensions"
  preconditions:
    - "A Variable exists in the registry with some facets populated"
    - "The ontology declares required vs optional dimensions"
  main_flow:
    - "Curator runs SHACL validation against the Variable"
    - "Validator reports missing required dimensions and empty optional dimensions"
  postconditions:
    - "Curator knows which dimensions to fill in"
  related_cqs: []
  priority: should_have

- id: UC-DM-004
  name: "Discover Variables within a Dataset"
  actor: "Platform engineer"
  goal: "List all Variables that belong to a given Dataset"
  preconditions:
    - "Datasets and their Variables are linked via sky:hasVariable"
  main_flow:
    - "Engineer queries for all Variables in a Dataset"
    - "Results show each Variable's facet profile"
  postconditions:
    - "Engineer has a complete inventory of a Dataset's Variables"
  related_cqs: []
  priority: should_have

- id: UC-DM-005
  name: "Trace the publishing chain for a Variable"
  actor: "Stage 2 resolution kernel"
  goal: "Given a Variable, find its publishing Series, parent Dataset, and publishing Agent"
  preconditions:
    - "Variable ← Series → Dataset → Agent chain is modeled (sevocab:implementsVariable, sevocab:publishedInDataset, dct:publisher)"
  main_flow:
    - "Kernel starts from a candidate Variable"
    - "Kernel traverses implementsVariable inverse to find the Series"
    - "Kernel traverses publishedInDataset to find the Dataset"
    - "Kernel traverses dct:publisher to find the Agent"
  postconditions:
    - "The full provenance chain (Variable ← Series → Dataset → Agent) is available"
  related_cqs: []
  priority: must_have
  notes: >
    A single Variable may be reached from multiple Series (e.g. two
    series for installed-renewable-capacity); the traversal is a
    set-union over all implementing Series. Dedup semantics for this
    case are covered by SKY-318's validation CQs.

- id: UC-DM-006
  name: "Validate ontology structure against TypeScript types"
  actor: "Platform engineer"
  goal: "Ensure the TypeScript domain model matches the ontology structure"
  preconditions:
    - "Ontology declares classes, properties, and restrictions"
    - "TypeScript declares interfaces and types"
  main_flow:
    - "Engineer compares ontology class hierarchy with TypeScript type hierarchy"
    - "Engineer verifies property names and cardinalities match"
  postconditions:
    - "Discrepancies between ontology and TypeScript are identified"
  related_cqs: []
  priority: could_have

- id: UC-DM-007
  name: "Validate Series chain integrity (SKY-318)"
  actor: "Stage 2 resolution kernel + data curator"
  goal: "Prove that the Dataset -> Series -> Variable structural chain is
    internally consistent, that no Series dangles without a publishing
    dataset, and that many-Series-per-Variable is legal but observable."
  preconditions:
    - "sevocab:Series declared as an owl:Class (SKY-316)"
    - "sevocab:hasSeries / sevocab:publishedInDataset declared as inverses"
    - "sevocab:implementsVariable declared as owl:FunctionalProperty"
    - "sevocab-shapes:SeriesShape enforces sh:minCount 1 on both structural links"
  main_flow:
    - "Kernel or curator queries the new Series-focused CQs (CQ-069 through CQ-074)"
    - "The missing-dataset-link guard (CQ-073) reports zero violations"
    - "The chain-agreement check (CQ-071) reports an empty disagreement set"
    - "The dedup observability query (CQ-072) surfaces many-to-one Variables for runtime union-merge"
    - "The per-Agent shelf query (CQ-074) aggregates Series and Variables via the chain"
  postconditions:
    - "Every Series resolves to exactly one Dataset and exactly one Variable"
    - "The series-chain view and the denormalized hasVariable view agree on all (dataset, variable) pairs"
    - "Observability of many-Series-per-Variable is exposed to consumers"
  related_cqs:
    - CQ-069
    - CQ-070
    - CQ-071
    - CQ-072
    - CQ-073
    - CQ-074
  priority: must_have
  notes: >
    This use case is the ontology-side mirror of the SKY-317 runtime
    invariants: series-backed variablesByDatasetId with union-merge
    semantics, validator rejection of dangling datasetId references,
    and agent-shelf coverage via the dataset/series chain. Runtime
    capability probes land in SKY-330 (separate repo).
