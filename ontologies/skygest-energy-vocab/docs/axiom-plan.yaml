summary:
  total_cqs: 53
  must_have_cqs: 41
  cqs_requiring_owl_axioms: 1
  cqs_requiring_shacl: 5
  cqs_requiring_sparql_only: 13
  cqs_requiring_build_script: 3

  owl_axioms_needed:
    - "SurfaceFormEntry class declaration"
    - "hasProvenanceAnnotation object property declaration"
    - "surfaceFormValue functional datatype property declaration"
    - "provenance functional datatype property declaration"

  shacl_shapes_needed:
    - "ConceptShape (prefLabel, altLabel, definition, inScheme cardinality)"
    - "SurfaceFormEntryShape (surfaceFormValue, provenance, conditional notes)"

  note: >
    This vocabulary is remarkably light on OWL axioms. The primary
    modeling work is SKOS assertions (A-box), SHACL validation shapes,
    and build-script constraints. The architect phase will focus on
    correct Turtle serialization, SHACL shape authoring, and build
    script development rather than complex OWL reasoning.
