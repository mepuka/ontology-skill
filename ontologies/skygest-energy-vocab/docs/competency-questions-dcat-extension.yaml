# Competency Questions: DCAT Structural Extension
# CQ IDs continue from sevocab's existing CQ-053.

# =============================================================================
# UC-DM-001: Variable Composition
# =============================================================================

- id: CQ-054
  source_use_case: UC-DM-001
  natural_language: "What are the facet dimensions of an EnergyVariable?"
  type: enumerative
  priority: must_have
  sample_answer:
    - dimension: sevocab:measuredProperty
    - dimension: sevocab:domainObject
    - dimension: sevocab:technologyOrFuel
    - dimension: sevocab:statisticType
    - dimension: sevocab:aggregation
    - dimension: sevocab:unitFamily
    - dimension: sevocab:policyInstrument
  derivation_method: direct_lookup
  out_of_scope:
    - "The values within each dimension (those are SKOS concepts in sevocab)"
  sparql: |
    PREFIX qb: <http://purl.org/linked-data/cube#>
    PREFIX sevocab: <https://skygest.dev/vocab/energy/>
    SELECT ?dimension ?codeList WHERE {
      sevocab:EnergyVariableStructure qb:component ?comp .
      ?comp qb:dimension ?dimension .
      ?dimension qb:codeList ?codeList .
    }
  expected_result: exactly_7
  required_classes:
    - EnergyVariable
  required_properties:
    - qb:component
    - qb:dimension
    - qb:codeList

- id: CQ-055
  source_use_case: UC-DM-001
  natural_language: "Which ConceptScheme provides the code list for the measuredProperty dimension?"
  type: relational
  priority: must_have
  sample_answer:
    - codeList: sevocab:MeasuredPropertyScheme
  derivation_method: direct_lookup
  out_of_scope: []
  sparql: |
    PREFIX qb: <http://purl.org/linked-data/cube#>
    PREFIX sevocab: <https://skygest.dev/vocab/energy/>
    SELECT ?codeList WHERE {
      sevocab:measuredProperty qb:codeList ?codeList .
    }
  expected_result: non_empty
  required_classes: []
  required_properties:
    - qb:codeList

- id: CQ-056
  source_use_case: UC-DM-001
  natural_language: "Is each facet dimension a qb:DimensionProperty?"
  type: boolean
  priority: must_have
  sample_answer:
    - result: true (all 7 dimensions are qb:DimensionProperty)
  derivation_method: direct_lookup
  out_of_scope: []
  sparql: |
    PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
    PREFIX qb: <http://purl.org/linked-data/cube#>
    PREFIX sevocab: <https://skygest.dev/vocab/energy/>
    SELECT ?dimension WHERE {
      sevocab:EnergyVariableStructure qb:component/qb:dimension ?dimension .
      FILTER NOT EXISTS { ?dimension rdf:type qb:DimensionProperty }
    }
  expected_result: empty
  required_classes: []
  required_properties: []

- id: CQ-057
  source_use_case: UC-DM-001
  natural_language: "Is EnergyVariable a subclass of schema:StatisticalVariable?"
  type: boolean
  priority: must_have
  sample_answer:
