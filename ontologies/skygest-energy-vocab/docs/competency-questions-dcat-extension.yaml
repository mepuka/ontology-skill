  expected_result: true
  required_classes:
    - EnergyVariable
  required_properties: []

# =============================================================================
# UC-DM-002: DCAT Chain Traversal for Disambiguation
# =============================================================================

- id: CQ-058
  source_use_case: UC-DM-002
  natural_language: "What Datasets does a given Agent publish?"
  type: relational
  priority: must_have
  sample_answer:
    - agent: ex:IRENA
      dataset: ex:RenewableCapacityStatistics2024
  derivation_method: direct_lookup
  out_of_scope:
    - "Historical publishing (only current publisher relationship)"
  sparql: |
    PREFIX dct: <http://purl.org/dc/terms/>
    PREFIX sevocab: <https://skygest.dev/vocab/energy/>
    SELECT ?dataset ?title WHERE {
      ?dataset a sevocab:EnergyDataset ;
               dct:publisher ?agent ;
               dct:title ?title .
    }
  expected_result: non_empty
  required_classes:
    - EnergyDataset
    - EnergyAgent
  required_properties:
    - dct:publisher

- id: CQ-059
