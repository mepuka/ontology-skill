# =============================================================================
# UC-DM-003: Facet Completeness Validation
# =============================================================================

- id: CQ-063
  source_use_case: UC-DM-003
  natural_language: "Can an EnergyVariable have more than one value for a single facet dimension?"
  type: constraint
  priority: must_have
  sample_answer:
    - result: "No — each dimension has max cardinality 1"
  derivation_method: inference
  out_of_scope: []
  sparql: |
    PREFIX owl: <http://www.w3.org/2002/07/owl#>
    PREFIX sevocab: <https://skygest.dev/vocab/energy/>
    SELECT ?restriction WHERE {
      sevocab:EnergyVariable rdfs:subClassOf ?restriction .
      ?restriction a owl:Restriction ;
                   owl:onProperty sevocab:measuredProperty ;
                   owl:maxQualifiedCardinality ?max .
      FILTER (?max = 1)
    }
  expected_result: non_empty
  required_classes:
    - EnergyVariable
  required_properties:
    - sevocab:measuredProperty
  required_axioms:
    - "maxQualifiedCardinality 1 on each facet dimension"

- id: CQ-064
  source_use_case: UC-DM-003
  natural_language: "Which facet dimensions are required for a valid EnergyVariable?"
  type: enumerative
  priority: should_have
  sample_answer:
    - required: [measuredProperty, statisticType]
    - optional: [domainObject, technologyOrFuel, aggregation, unitFamily, policyInstrument]
  derivation_method: direct_lookup
  out_of_scope:
    - "Application-level validation rules beyond ontology constraints"
  sparql: |
    PREFIX sh: <http://www.w3.org/ns/shacl#>
    PREFIX sevocab: <https://skygest.dev/vocab/energy/>
    SELECT ?property ?minCount WHERE {
      sevocab:EnergyVariableShape sh:property ?propShape .
      ?propShape sh:path ?property ;
                 sh:minCount ?minCount .
      FILTER (?minCount > 0)
    }
  expected_result: non_empty
  required_classes:
    - EnergyVariable
  required_properties: []

