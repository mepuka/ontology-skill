    - id: DN-05
      title: "HasKey identity contracts"
      status: resolved
      note: >
        Resolved in v0.3.0 -- owl:hasKey axioms added for AIAgent
        (hasAgentId), Session (hasSessionId), and Conversation
        (hasConversationId).
    - id: DN-06
      title: "Compaction trigger-causality is weak"
      status: open
      note: >
        UC-030 describes a causal flow (usage exceeded threshold => compaction)
        but the ontology only models static links (CQ-063 checks current
        utilization, CQ-064 checks a link to compaction event). There is no
        explicit event-time snapshot or threshold assertion to prove the
        trigger condition historically. Future work could add a reified
        trigger event or temporal snapshot pattern.
