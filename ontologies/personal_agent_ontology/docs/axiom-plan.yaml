  # ═══════════════════════════════════════════════════════════════════════
  # v0.3.0: Compaction Trace, Eviction, Resume, Identity, Transitions
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-052
    natural_language: "What items were dropped during a compaction event?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          CompactionEvent SubClassOf compactedItem some prov:Entity
        note: "Every compaction event operates on items"
      - pattern: "9. N-ary Relation"
        axiom_sketch: |
          CompactionDisposition SubClassOf dispositionOf some prov:Entity
          CompactionDisposition SubClassOf hasItemFate some ItemFate
        note: "N-ary reification linking event, item, and fate"
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "CompactionDisposition SubClassOf prov:Entity"
        note: "CompactionDisposition is a GDC"
    tbox_requirements:
      - "CompactionDisposition class declaration"
      - "ItemFate class with owl:oneOf (Preserved, Dropped, Summarized, Archived)"
      - "compactedItem ObjectProperty subPropertyOf prov:used"
      - "hasCompactionDisposition ObjectProperty"
      - "dispositionOf ObjectProperty (functional)"
      - "hasItemFate ObjectProperty (functional)"
      - "Import prov:used, prov:wasInvalidatedBy"
    abox_requirements:
      - "CompactionEvent with compactedItem links to items"
      - "Items with prov:wasInvalidatedBy for dropped items"
      - "CompactionDisposition individuals with fate and reason"

  - cq_id: CQ-053
    natural_language: "What fraction of items were preserved during compaction?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "(reuses CQ-052 infrastructure)"
        note: "COUNT/fraction is a SPARQL aggregation concern"
    tbox_requirements:
      - "Same as CQ-052 (compactedItem, prov:wasInvalidatedBy)"
    abox_requirements:
      - "Mix of preserved and dropped items for ratio testing"

  - cq_id: CQ-054
    natural_language: "When was a memory item last accessed?"
    priority: should_have
    module: pao-memory
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "(hasLastAccessTime is optional; no existential)"
        note: "Not all memory items have last-access tracking"
    tbox_requirements:
      - "hasLastAccessTime DataProperty with domain MemoryItem, range xsd:dateTime, functional"
    abox_requirements:
      - "MemoryItem individuals with hasLastAccessTime values"

  - cq_id: CQ-055
    natural_language: "Which memory items in a given tier are eligible for eviction?"
    priority: should_have
    module: pao-memory
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "(isEvictionCandidate is optional; no existential)"
        note: "Boolean flag on memory items; SPARQL filters on true"
    tbox_requirements:
      - "isEvictionCandidate DataProperty with domain MemoryItem, range xsd:boolean, functional"
    abox_requirements:
      - "MemoryItem individuals with isEvictionCandidate true/false"

  - cq_id: CQ-056
    natural_language: "Which session continued from a given prior session?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "(continuedFrom is optional; no existential)"
        note: "Not all sessions are continuations"
    tbox_requirements:
      - "continuedFrom ObjectProperty with domain Session, range Session, functional"
      - "continuedBy ObjectProperty (inverse of continuedFrom)"
    abox_requirements:
      - "Session pair linked by continuedFrom"

  - cq_id: CQ-057
    natural_language: "What is the unique identifier for a given agent, session, or conversation?"
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "11. HasKey"
        axiom_sketch: |
          AIAgent owl:hasKey (hasAgentId)
          Session owl:hasKey (hasSessionId)
          Conversation owl:hasKey (hasConversationId)
        note: "Identity contracts for key entities (DN-05 resolved)"
    tbox_requirements:
      - "hasAgentId, hasSessionId, hasConversationId DataProperties (functional)"
      - "owl:hasKey axioms on AIAgent, Session, Conversation"
    abox_requirements:
      - "Entities with unique ID string values"

  - cq_id: CQ-058
    natural_language: "What status transitions has a task undergone?"
    priority: should_have
    module: pao-event
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          StatusTransition SubClassOf Event
          TaskStatusTransition SubClassOf StatusTransition
          SessionStatusTransition SubClassOf StatusTransition
        note: "Reified Event pattern for status transitions"
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          StatusTransition SubClassOf fromStatus some Status
          StatusTransition SubClassOf toStatus some Status
          StatusTransition SubClassOf transitionSubject some owl:Thing
        note: "Every transition has from, to, and subject"
      - pattern: "5. Disjoint Classes"
        axiom_sketch: |
          DisjointClasses: SessionStatusTransition, TaskStatusTransition
        note: "Transition subtypes are disjoint"
    tbox_requirements:
      - "StatusTransition, SessionStatusTransition, TaskStatusTransition classes"
      - "fromStatus, toStatus, transitionSubject ObjectProperties (functional)"
      - "previousTransition/nextTransition inverse pair (functional)"
      - "triggeredBy ObjectProperty"
    abox_requirements:
      - "TaskStatusTransition chain: Pending -> InProgress -> Completed"
      - "previousTransition/nextTransition links between transitions"

  - cq_id: CQ-059
    natural_language: "What was the previous status of a session before it ended?"
    priority: should_have
    module: pao-event
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "(reuses CQ-058 infrastructure)"
        note: "SPARQL filters on SessionStatusTransition with toStatus=Ended"
    tbox_requirements:
      - "SessionStatusTransition class (reused from CQ-058)"
    abox_requirements:
      - "SessionStatusTransition with toStatus=Ended"

  - cq_id: CQ-060
    natural_language: "What event triggered a given status transition?"
    priority: could_have
    module: pao-event
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "(triggeredBy is optional; no existential)"
        note: "Not all transitions have explicit triggers"
    tbox_requirements:
      - "triggeredBy ObjectProperty with domain StatusTransition, range Event"
    abox_requirements:
      - "StatusTransition with triggeredBy link to an Event"

  # ─────────────────────────────────────────────────────────────────────
  # v0.4.0: Context Window
  # ─────────────────────────────────────────────────────────────────────

  - cq_id: CQ-061
    natural_language: "What context window is associated with a given session?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "Functional property (no existential)"
        axiom_sketch: "hasContextWindow: Session -> ContextWindow [functional, optional]"
        note: "Optional link — not every session has a context window. SHACL enforces max 1 when present."
    tbox_requirements:
      - "ContextWindow class, subclass of prov:Entity (BFO:GDC)"
      - "hasContextWindow ObjectProperty with domain Session, range ContextWindow, functional"
    abox_requirements:
      - "Session with hasContextWindow link to a ContextWindow individual"

  - cq_id: CQ-062
    natural_language: "What is the token capacity and current usage of a context window?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ContextWindow SubClassOf hasTokenCapacity some xsd:nonNegativeInteger AND hasTokensUsed some xsd:nonNegativeInteger"
        note: "Every context window must have capacity and usage"
    tbox_requirements:
      - "hasTokenCapacity DataProperty with domain ContextWindow, range xsd:nonNegativeInteger, functional"
      - "hasTokensUsed DataProperty with domain ContextWindow, range xsd:nonNegativeInteger, functional"
    abox_requirements:
      - "ContextWindow with hasTokenCapacity and hasTokensUsed values"

  - cq_id: CQ-063
    natural_language: "Which context windows have usage exceeding a given threshold?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "SPARQL FILTER"
        axiom_sketch: "FILTER(?used > ?capacity * 8 / 10)"
        note: "Threshold comparison — pure SPARQL, no additional axioms needed"
    tbox_requirements:
      - "(Covered by CQ-062 properties)"
    abox_requirements:
      - "ContextWindow with usage > 80% of capacity"

  - cq_id: CQ-064
    natural_language: "Which compaction events were triggered by a specific context window?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "Functional property (no existential)"
        axiom_sketch: "compactedContextOf: CompactionEvent -> ContextWindow [functional, optional]"
        note: "Optional link — not all compaction events are triggered by context window state. SHACL enforces max 1 when present."
    tbox_requirements:
      - "compactedContextOf ObjectProperty with domain CompactionEvent, range ContextWindow, functional"
    abox_requirements:
      - "CompactionEvent with compactedContextOf link to a ContextWindow"

  - cq_id: CQ-065
    natural_language: "What is the available (remaining) capacity of a context window?"
    priority: could_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "SPARQL computation"
        axiom_sketch: "(?capacity - ?used AS ?available)"
        note: "Derived value — computed in SPARQL, no additional axioms needed"
    tbox_requirements:
      - "(Covered by CQ-062 properties)"
    abox_requirements:
      - "(Covered by CQ-062 sample data)"

  # ─── v0.5.0 Additions: Communication Channels & Integrations ───

  - cq_id: CQ-066
    natural_language: "What communication channel was used for a given session?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "CommunicationChannel rdfs:subClassOf prov:Entity"
        note: "CommunicationChannel is a GDC (BFO:0000031) — configured endpoint specification"
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Session SubClassOf viaChannel some CommunicationChannel"
        note: "Optional in practice (not all sessions have a channel), but existential enables reasoning about channel-linked sessions"
      - pattern: "Functional property"
        axiom_sketch: "viaChannel: Session -> CommunicationChannel [functional]"
        note: "Each session uses at most one channel"
    tbox_requirements:
      - "CommunicationChannel class (subClassOf prov:Entity, BFO GDC)"
      - "viaChannel ObjectProperty with domain Session, range CommunicationChannel, functional"
    abox_requirements:
      - "Session instance with viaChannel link to a CommunicationChannel instance"

  - cq_id: CQ-067
    natural_language: "What type of communication channel is it (CLI, Messaging, WebChat, etc.)?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "8. Value Partition"
        axiom_sketch: "ChannelType subClassOf Status; owl:oneOf (CLI, Messaging, WebChat, APIChannel, VoiceChannel, EmailChannel)"
        note: "Controlled vocabulary for communication mediums — follows ODP-6 pattern"
      - pattern: "15. Enumeration (owl:oneOf)"
        axiom_sketch: "ChannelType owl:oneOf (pao:CLI, pao:Messaging, pao:WebChat, pao:APIChannel, pao:VoiceChannel, pao:EmailChannel)"
        note: "Closed enumeration — 6 channel type individuals"
      - pattern: "2. Existential Restriction"
        axiom_sketch: "CommunicationChannel SubClassOf hasChannelType some ChannelType"
        note: "Every channel has a type"
      - pattern: "Functional property"
        axiom_sketch: "hasChannelType: CommunicationChannel -> ChannelType [functional]"
        note: "Each channel has exactly one type"
    tbox_requirements:
      - "ChannelType class (subClassOf Status, Value Partition)"
      - "hasChannelType ObjectProperty with domain CommunicationChannel, range ChannelType, functional"
      - "6 ChannelType individuals with owl:oneOf and AllDifferent"
    abox_requirements:
      - "CommunicationChannel instance with hasChannelType link to a ChannelType individual"

  - cq_id: CQ-068
    natural_language: "Which sessions used a specific type of communication channel?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "SPARQL two-hop join"
        axiom_sketch: "?session viaChannel ?channel . ?channel hasChannelType ?type ."
        note: "No additional axioms needed — uses CQ-066 viaChannel and CQ-067 hasChannelType"
    tbox_requirements:
      - "(Covered by CQ-066 and CQ-067)"
    abox_requirements:
      - "Session with viaChannel to a typed CommunicationChannel"

  - cq_id: CQ-069
    natural_language: "Which messages were sent via a specific communication channel?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Message SubClassOf sentViaChannel some CommunicationChannel"
        note: "Optional — message-level channel attribution for multi-channel conversations"
      - pattern: "Functional property"
        axiom_sketch: "sentViaChannel: Message -> CommunicationChannel [functional]"
        note: "Each message is sent via at most one channel"
    tbox_requirements:
      - "sentViaChannel ObjectProperty with domain Message, range CommunicationChannel, functional"
    abox_requirements:
      - "Message instance with sentViaChannel link to a CommunicationChannel"

  - cq_id: CQ-070
    natural_language: "What communication channels are used across a conversation?"
    priority: could_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "SPARQL multi-hop join"
        axiom_sketch: "?session partOfConversation ?conv . ?session viaChannel ?channel . ?channel hasChannelType ?type ."
        note: "Three-hop join — no additional axioms beyond CQ-066 and CQ-067"
    tbox_requirements:
      - "(Covered by CQ-005 partOfConversation, CQ-066 viaChannel, CQ-067 hasChannelType)"
    abox_requirements:
      - "Conversation with multiple Sessions, each having distinct CommunicationChannels"

  - cq_id: CQ-071
    natural_language: "What integrations does an agent have?"
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "Integration rdfs:subClassOf prov:Entity"
        note: "Integration is a GDC (BFO:0000031) — configured connection to an external service"
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Agent SubClassOf hasIntegration some Integration"
        note: "Optional in practice — not all agents have integrations, but existential enables reasoning"
    tbox_requirements:
      - "Integration class (subClassOf prov:Entity, BFO GDC)"
      - "hasIntegration ObjectProperty with domain Agent, range Integration"
    abox_requirements:
      - "Agent instance with hasIntegration link to an Integration instance"

  - cq_id: CQ-072
    natural_language: "What tools does an integration provide?"
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Integration SubClassOf providesTool some ToolDefinition"
        note: "Every integration provides at least one tool"
    tbox_requirements:
      - "providesTool ObjectProperty with domain Integration, range ToolDefinition"
    abox_requirements:
      - "Integration instance with providesTool links to ToolDefinition instances"

  - cq_id: CQ-073
    natural_language: "What is the status of an agent's integrations?"
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "8. Value Partition"
        axiom_sketch: "IntegrationStatus subClassOf Status; owl:oneOf (Connected, Disconnected, Error, Initializing)"
        note: "Controlled vocabulary for integration operational states — follows ODP-6 pattern"
      - pattern: "15. Enumeration (owl:oneOf)"
        axiom_sketch: "IntegrationStatus owl:oneOf (pao:Connected, pao:Disconnected, pao:Error, pao:Initializing)"
        note: "Closed enumeration — 4 integration status individuals"
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Integration SubClassOf hasIntegrationStatus some IntegrationStatus"
        note: "Every integration has a status"
      - pattern: "Functional property"
        axiom_sketch: "hasIntegrationStatus: Integration -> IntegrationStatus [functional]"
        note: "Each integration has exactly one status at a time"
    tbox_requirements:
      - "IntegrationStatus class (subClassOf Status, Value Partition)"
      - "hasIntegrationStatus ObjectProperty with domain Integration, range IntegrationStatus, functional, subPropertyOf hasStatus"
      - "4 IntegrationStatus individuals with owl:oneOf and AllDifferent"
    abox_requirements:
      - "Integration instance with hasIntegrationStatus link to an IntegrationStatus individual"

  - cq_id: CQ-074
    natural_language: "Which integration provides a specific tool?"
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "SPARQL reverse lookup"
        axiom_sketch: "?integration providesTool ?tool . FILTER(?tool = pao:SpecificTool)"
        note: "No additional axioms — reverse lookup on CQ-072 providesTool"
    tbox_requirements:
      - "(Covered by CQ-072)"
    abox_requirements:
      - "(Covered by CQ-072)"

  - cq_id: CQ-075
    natural_language: "How many tools does each integration provide?"
    priority: could_have
    module: pao-core
    axiom_patterns:
      - pattern: "SPARQL aggregation"
        axiom_sketch: "(COUNT(?tool) AS ?toolCount)"
        note: "Aggregation query — no additional axioms beyond CQ-072"
    tbox_requirements:
      - "(Covered by CQ-072)"
    abox_requirements:
      - "Integration instances with multiple providesTool links"

  - cq_id: CQ-076
    natural_language: "Which integrations are in an error state?"
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "SPARQL FILTER"
        axiom_sketch: "FILTER(?status = pao:Error)"
        note: "Status filter — no additional axioms beyond CQ-073"
    tbox_requirements:
      - "(Covered by CQ-073)"
    abox_requirements:
      - "Integration instance with hasIntegrationStatus pao:Error"

  - cq_id: CQ-077
    natural_language: "Trace tool invocations to their source integration."
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "SPARQL multi-hop join"
        axiom_sketch: "?invocation invokesTool ?tool . ?integration providesTool ?tool ."
        note: "Two-hop join — links ToolInvocation to Integration via shared ToolDefinition. No additional axioms needed."
    tbox_requirements:
      - "(Covered by CQ-007 invokesTool and CQ-072 providesTool)"
    abox_requirements:
      - "ToolInvocation with invokesTool link to a ToolDefinition that is also linked via providesTool from an Integration"

  - cq_id: CQ-078
    natural_language: "Query service name and endpoint for agent integrations."
    priority: should_have
    module: pao-core
    axiom_patterns:
      - pattern: "Data property lookup"
        axiom_sketch: "Integration hasServiceName xsd:string ; hasEndpoint xsd:anyURI"
        note: "Functional data properties. hasServiceName is required (SHACL min 1), hasEndpoint is optional (some local integrations have no network endpoint)."
    tbox_requirements:
      - "DataProperty hasServiceName domain Integration range xsd:string [functional]"
      - "DataProperty hasEndpoint domain Integration range xsd:anyURI [functional]"
    abox_requirements:
      - "Integration individuals with hasServiceName and optionally hasEndpoint"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 8: External Service Capability Model (pao-services) — v0.6.0 Phase A
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-079
    natural_language: "What external services are configured for each agent?"
    priority: must_have
    module: pao-services
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          ExternalService SubClassOf prov:Entity
          ServiceConnection SubClassOf prov:Entity
        note: "Establishes external service and connection classes."
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          ExternalService SubClassOf exposesCapability some ServiceCapability
          ServiceConnection SubClassOf connectsToService some ExternalService
        note: "Every external service exposes at least one capability; every connection targets a service."
    tbox_requirements:
      - "Class ExternalService SubClassOf prov:Entity, BFO:GDC"
      - "Class ServiceConnection SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty hasExternalService domain Agent range ExternalService"
      - "ObjectProperty hasServiceConnection domain Agent range ServiceConnection"
      - "ObjectProperty connectsToService domain ServiceConnection range ExternalService [functional]"
      - "ObjectProperty hasConnectionStatus domain ServiceConnection range ConnectionStatus [functional] subPropertyOf hasStatus"
    abox_requirements:
      - "ExternalService individuals with labels and service identifiers"
      - "ServiceConnection individuals linking agents to services with ConnectionStatus"

  - cq_id: CQ-080
    natural_language: "What capabilities does a given external service expose?"
    priority: must_have
    module: pao-services
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          ServiceCapability SubClassOf prov:Entity
          ServiceToolCapability SubClassOf ServiceCapability
          ServiceResourceCapability SubClassOf ServiceCapability
          ServicePromptCapability SubClassOf ServiceCapability
        note: "MCP capability type hierarchy."
      - pattern: "5. Disjoint Classes"
        axiom_sketch: "DisjointUnion(ServiceCapability, ServiceToolCapability, ServiceResourceCapability, ServicePromptCapability)"
        note: "Capabilities are one of exactly three types."
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ExternalService SubClassOf exposesCapability some ServiceCapability"
        note: "Every service exposes at least one capability."
    tbox_requirements:
      - "Class ServiceCapability SubClassOf prov:Entity"
      - "Class ServiceToolCapability SubClassOf ServiceCapability"
      - "Class ServiceResourceCapability SubClassOf ServiceCapability"
      - "Class ServicePromptCapability SubClassOf ServiceCapability"
      - "DisjointUnion on ServiceCapability subtypes"
      - "ObjectProperty exposesCapability domain ExternalService range ServiceCapability"
    abox_requirements:
      - "ServiceCapability individuals of each subtype linked to services"

  - cq_id: CQ-081
    natural_language: "Which capabilities were discovered in the latest discovery event?"
    priority: should_have
    module: pao-services
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "CapabilityDiscoveryEvent SubClassOf Event"
        note: "Discovery events are a type of Event (Process)."
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          CapabilityDiscoveryEvent SubClassOf discoveredCapability some ServiceCapability
          CapabilityDiscoveryEvent SubClassOf discoveryAgainstService some ExternalService
        note: "Every discovery event finds at least one capability from a service."
    tbox_requirements:
      - "Class CapabilityDiscoveryEvent SubClassOf Event"
      - "ObjectProperty discoveredCapability domain CapabilityDiscoveryEvent range ServiceCapability"
      - "ObjectProperty discoveryAgainstService domain CapabilityDiscoveryEvent range ExternalService [functional]"
    abox_requirements:
      - "CapabilityDiscoveryEvent individuals with discovered capabilities and target service"

  - cq_id: CQ-082
    natural_language: "Which services provide resources versus tools versus prompts?"
    priority: should_have
    module: pao-services
    axiom_patterns:
      - pattern: "5. Disjoint Classes"
        axiom_sketch: "DisjointUnion(ServiceCapability, ServiceToolCapability, ServiceResourceCapability, ServicePromptCapability)"
        note: "Reuses CQ-080 DisjointUnion. CQ-082 is answerable via subclass reasoning on typed capabilities."
    tbox_requirements:
      - "Reuses CQ-080 TBox (DisjointUnion on capability subtypes)"
    abox_requirements:
      - "ABox from CQ-080 sufficient"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 9: Runtime Safety Control Plane (extends pao-governance) — v0.6.0 Phase A
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-083
    natural_language: "What permission mode is active for each agent?"
    priority: must_have
    module: pao-governance
    axiom_patterns:
      - pattern: "8. Value Partition"
        axiom_sketch: |
          PermissionMode SubClassOf Status
          owl:oneOf(Permissive, Standard, Restrictive)
        note: "ODP-6 closed vocabulary for permission modes."
      - pattern: "15. Enumeration (owl:oneOf)"
        axiom_sketch: "PermissionMode EquivalentTo owl:oneOf(Permissive, Standard, Restrictive)"
    tbox_requirements:
      - "Class PermissionMode SubClassOf Status"
      - "Enumeration: owl:oneOf(Permissive, Standard, Restrictive)"
      - "ObjectProperty operatesInMode domain AIAgent range PermissionMode [functional]"
    abox_requirements:
      - "PermissionMode individuals: Permissive, Standard, Restrictive"
      - "AIAgent individuals with operatesInMode links"

  - cq_id: CQ-084
    natural_language: "Which sandbox policy constrains a given agent?"
    priority: should_have
    module: pao-governance
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "SandboxPolicy SubClassOf prov:Entity"
      - pattern: "2. Existential Restriction"
        axiom_sketch: "SandboxPolicy SubClassOf appliesTo some Agent"
        note: "Every sandbox policy applies to at least one agent."
    tbox_requirements:
      - "Class SandboxPolicy SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty enforcedBySandboxPolicy domain AIAgent range SandboxPolicy [functional]"
    abox_requirements:
      - "SandboxPolicy individuals with labels"
      - "AIAgent individuals with enforcedBySandboxPolicy links"

  - cq_id: CQ-085
    natural_language: "Which hooks intercepted a specific tool invocation?"
    priority: should_have
    module: pao-governance
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          Hook SubClassOf prov:Entity
          HookExecution SubClassOf Event
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          HookExecution SubClassOf interceptsInvocation some ToolInvocation
        note: "Every hook execution intercepts exactly one tool invocation."
    tbox_requirements:
      - "Class Hook SubClassOf prov:Entity, BFO:GDC"
      - "Class HookExecution SubClassOf Event, BFO:Process"
      - "ObjectProperty hasHook domain AIAgent range Hook"
      - "ObjectProperty hookTriggeredExecution domain Hook range HookExecution"
      - "ObjectProperty interceptsInvocation domain HookExecution range ToolInvocation [functional]"
    abox_requirements:
      - "Hook and HookExecution individuals linked to agents and invocations"

  - cq_id: CQ-086
    natural_language: "What authorization decisions were recorded for denied operations?"
    priority: must_have
    module: pao-governance
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          AuditLog SubClassOf prov:Entity
          AuditEntry SubClassOf prov:Entity
      - pattern: "8. Value Partition"
        axiom_sketch: |
          AuthorizationDecision SubClassOf Status
          owl:oneOf(Allow, Deny, RequireApproval)
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          AuditEntry SubClassOf recordsDecision some AuthorizationDecision
          AuditEntry SubClassOf auditForInvocation some ToolInvocation
    tbox_requirements:
      - "Class AuditLog SubClassOf prov:Entity, BFO:GDC"
      - "Class AuditEntry SubClassOf prov:Entity, BFO:GDC"
      - "Class AuthorizationDecision SubClassOf Status"
      - "Enumeration: owl:oneOf(Allow, Deny, RequireApproval)"
      - "ObjectProperty writtenToAuditLog domain AuditEntry range AuditLog [functional]"
      - "ObjectProperty recordsDecision domain AuditEntry range AuthorizationDecision [functional]"
      - "ObjectProperty auditForInvocation domain AuditEntry range ToolInvocation [functional]"
    abox_requirements:
      - "AuthorizationDecision individuals: Allow, Deny, RequireApproval"
      - "AuditLog, AuditEntry individuals with decision links"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 10: Recovery and Resilience (pao-recovery) — v0.6.0 Phase A
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-087
    natural_language: "What recovery events occurred after failed invocations?"
    priority: must_have
    module: pao-recovery
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          ErrorRecoveryEvent SubClassOf Event
          RetryAttempt SubClassOf Event
          ReplanEvent SubClassOf Event
          RollbackEvent SubClassOf Event
      - pattern: "5. Disjoint Classes"
        axiom_sketch: "Disjoint(ErrorRecoveryEvent, RetryAttempt, ReplanEvent, RollbackEvent)"
        note: "Recovery event subtypes are pairwise disjoint."
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ErrorRecoveryEvent SubClassOf recoveringFrom some ToolInvocation"
        note: "Every recovery event is triggered by a failed invocation."
    tbox_requirements:
      - "Class ErrorRecoveryEvent SubClassOf Event"
      - "Class RetryAttempt SubClassOf Event"
      - "Class ReplanEvent SubClassOf Event"
      - "Class RollbackEvent SubClassOf Event"
      - "Disjoint(ErrorRecoveryEvent, RetryAttempt, ReplanEvent, RollbackEvent)"
      - "ObjectProperty recoveringFrom domain ErrorRecoveryEvent range ToolInvocation [functional]"
      - "ObjectProperty attemptedRetry domain ErrorRecoveryEvent range RetryAttempt"
      - "ObjectProperty triggeredReplan domain ErrorRecoveryEvent range ReplanEvent [functional]"
      - "ObjectProperty triggeredRollback domain ErrorRecoveryEvent range RollbackEvent [functional]"
    abox_requirements:
      - "ErrorRecoveryEvent, RetryAttempt, ReplanEvent, and RollbackEvent individuals"

  - cq_id: CQ-088
    natural_language: "How many retries were attempted before success or abandonment?"
    priority: should_have
    module: pao-recovery
    axiom_patterns:
      - pattern: "Data property lookup"
        axiom_sketch: "ErrorRecoveryEvent hasAttemptCount xsd:nonNegativeInteger"
        note: "Functional data property for retry count."
    tbox_requirements:
      - "DataProperty hasAttemptCount domain ErrorRecoveryEvent range xsd:nonNegativeInteger [functional]"
    abox_requirements:
      - "ErrorRecoveryEvent individuals with hasAttemptCount values"

  - cq_id: CQ-089
    natural_language: "Which tasks required human checkpoint decisions?"
    priority: should_have
    module: pao-recovery
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "Checkpoint SubClassOf prov:Entity"
      - pattern: "8. Value Partition"
        axiom_sketch: |
          CheckpointDecision SubClassOf Status
          owl:oneOf(Approved, Rejected, Deferred)
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          Checkpoint SubClassOf checkpointForTask some Task
        note: "Every checkpoint gates exactly one task."
    tbox_requirements:
      - "Class Checkpoint SubClassOf prov:Entity, BFO:GDC"
      - "Class CheckpointDecision SubClassOf Status"
      - "Enumeration: owl:oneOf(Approved, Rejected, Deferred)"
      - "ObjectProperty checkpointForTask domain Checkpoint range Task [functional]"
      - "ObjectProperty checkpointDecision domain Checkpoint range CheckpointDecision [functional]"
    abox_requirements:
      - "CheckpointDecision individuals: Approved, Rejected, Deferred"
      - "Checkpoint individuals with task and decision links"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 11: Tool/Message Trace Richness (extends pao-conversation) — v0.6.0 Phase B
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-090
    natural_language: "Which tool invocations were executed in parallel within a single turn?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          ToolInvocationGroup SubClassOf prov:Entity
        note: "Groups parallel invocations as a GDC (BFO:0000031)."
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          ToolInvocationGroup SubClassOf groupedInTurn some Turn
        note: "Every invocation group belongs to exactly one turn."
    tbox_requirements:
      - "Class ToolInvocationGroup SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty partOfInvocationGroup domain ToolInvocation range ToolInvocationGroup"
      - "ObjectProperty groupedInTurn domain ToolInvocationGroup range Turn [functional]"
    abox_requirements:
      - "ToolInvocationGroup individual with partOfInvocationGroup links from multiple ToolInvocations"

  - cq_id: CQ-091
    natural_language: "What result artifact was produced by each tool invocation?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "ToolResult SubClassOf prov:Entity"
        note: "ToolResult is a GDC (BFO:0000031) — the output artifact of a tool invocation."
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ToolInvocation SubClassOf producedToolResult some ToolResult"
        note: "Every invocation produces at least one result."
    tbox_requirements:
      - "Class ToolResult SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty producedToolResult domain ToolInvocation range ToolResult [functional]"
    abox_requirements:
      - "ToolResult individuals linked to ToolInvocation individuals"

  - cq_id: CQ-092
    natural_language: "Which message content blocks are tool-use blocks versus text blocks?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "ContentBlock SubClassOf prov:Entity"
        note: "ContentBlock is a GDC — a typed segment of message content."
      - pattern: "8. Value Partition"
        axiom_sketch: |
          ContentBlockType SubClassOf Status
          owl:oneOf(TextBlock, ToolUseBlock, ToolResultBlock, ImageBlock)
        note: "ODP-6: Exhaustive enumeration of content block kinds."
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          ContentBlock SubClassOf hasContentBlockType some ContentBlockType
        note: "Every content block has exactly one type."
    tbox_requirements:
      - "Class ContentBlock SubClassOf prov:Entity, BFO:GDC"
      - "Class ContentBlockType SubClassOf Status (Value Partition)"
      - "Enumeration: owl:oneOf(TextBlock, ToolUseBlock, ToolResultBlock, ImageBlock)"
      - "ObjectProperty hasContentBlock domain Message range ContentBlock"
      - "ObjectProperty hasContentBlockType domain ContentBlock range ContentBlockType [functional]"
      - "DataProperty blockSequenceIndex domain ContentBlock range xsd:nonNegativeInteger [functional]"
    abox_requirements:
      - "ContentBlockType individuals: TextBlock, ToolUseBlock, ToolResultBlock, ImageBlock"
      - "ContentBlock individuals with type and sequence index"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 12: Memory Control Plane and Sharing (extends pao-memory) — v0.6.0 Phase B
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-093
    natural_language: "What is the scope and source of each memory item?"
    priority: should_have
    module: pao-memory
    axiom_patterns:
      - pattern: "8. Value Partition"
        axiom_sketch: |
          MemorySource SubClassOf Status
          owl:oneOf(UserSource, SystemSource, AgentSource)
          MemoryScope SubClassOf Status
          owl:oneOf(SessionScope, ProjectScope, GlobalScope)
        note: "ODP-6: Two independent VP enumerations for memory provenance metadata."
    tbox_requirements:
      - "Class MemorySource SubClassOf Status (Value Partition)"
      - "Enumeration: owl:oneOf(UserSource, SystemSource, AgentSource)"
      - "Class MemoryScope SubClassOf Status (Value Partition)"
      - "Enumeration: owl:oneOf(SessionScope, ProjectScope, GlobalScope)"
      - "ObjectProperty hasMemorySource domain MemoryItem range MemorySource [functional]"
      - "ObjectProperty hasMemoryScope domain MemoryItem range MemoryScope [functional]"
    abox_requirements:
      - "MemorySource individuals: UserSource, SystemSource, AgentSource"
      - "MemoryScope individuals: SessionScope, ProjectScope, GlobalScope"
      - "MemoryItem individuals with hasMemorySource and hasMemoryScope links"

  - cq_id: CQ-094
    natural_language: "Which memory artifacts are shared across multiple agents?"
    priority: should_have
    module: pao-memory
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "SharedMemoryArtifact SubClassOf prov:Entity"
        note: >
          SharedMemoryArtifact is a standalone GDC, not a subclass of MemoryItem,
          to avoid disjointness conflict with Episode/Claim/MemoryBlock.
      - pattern: "2. Existential Restriction"
        axiom_sketch: "SharedMemoryArtifact SubClassOf sharedAcrossAgents some Agent"
        note: "Every shared artifact is shared with at least one agent (SHACL enforces min 2)."
    tbox_requirements:
      - "Class SharedMemoryArtifact SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty sharedAcrossAgents domain SharedMemoryArtifact range Agent"
    abox_requirements:
      - "SharedMemoryArtifact individual linked to ≥2 agents"

  - cq_id: CQ-095
    natural_language: "What memory write conflicts occurred and how were they resolved?"
    priority: should_have
    module: pao-memory
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "MemoryWriteConflict SubClassOf Event"
        note: "MemoryWriteConflict is a Process (BFO:0000015) — a concurrent-write event."
      - pattern: "9. N-ary Relation"
        axiom_sketch: |
          MemoryWriteConflict SubClassOf conflictOnArtifact some SharedMemoryArtifact
          MemoryWriteConflict SubClassOf writesByAgent some Agent
        note: "N-ary reification: a conflict involves an artifact and ≥2 agents."
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          MemoryWriteConflict SubClassOf conflictOnArtifact some SharedMemoryArtifact
          MemoryWriteConflict SubClassOf writesByAgent some Agent
        note: "Every conflict targets an artifact and involves at least one writing agent (SHACL enforces min 2)."
    tbox_requirements:
      - "Class MemoryWriteConflict SubClassOf Event"
      - "ObjectProperty conflictOnArtifact domain MemoryWriteConflict range SharedMemoryArtifact [functional]"
      - "ObjectProperty writesByAgent domain MemoryWriteConflict range Agent"
      - "ObjectProperty resolvedByPolicy domain MemoryWriteConflict range PermissionPolicy (optional)"
    abox_requirements:
      - "MemoryWriteConflict individual with artifact, ≥2 agents, and optional resolution policy"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 13: Dialog Pragmatics and Grounding (extends pao-conversation) — v0.6.0 Phase B
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-096
    natural_language: "What communicative function does each turn perform?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "DialogAct SubClassOf prov:Entity"
        note: "DialogAct is a GDC (BFO:0000031) — reifies the pragmatic intent of a turn."
      - pattern: "8. Value Partition"
        axiom_sketch: |
          CommunicativeFunction SubClassOf Status
          owl:oneOf(Inform, Request, Confirm, Clarify, Accept, Reject)
        note: "ODP-6: DIT++/ISO 24617-2 inspired function enumeration."
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          DialogAct SubClassOf hasCommunicativeFunction some CommunicativeFunction
        note: "Every dialog act has exactly one communicative function."
    tbox_requirements:
      - "Class DialogAct SubClassOf prov:Entity, BFO:GDC"
      - "Class CommunicativeFunction SubClassOf Status (Value Partition)"
      - "Enumeration: owl:oneOf(Inform, Request, Confirm, Clarify, Accept, Reject)"
      - "ObjectProperty hasDialogAct domain Turn range DialogAct"
      - "ObjectProperty hasCommunicativeFunction domain DialogAct range CommunicativeFunction [functional]"
    abox_requirements:
      - "CommunicativeFunction individuals: Inform, Request, Confirm, Clarify, Accept, Reject"
      - "DialogAct individuals linked to turns and functions"

  - cq_id: CQ-097
    natural_language: "Which turns updated common ground with acceptance evidence?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: |
          CommonGround SubClassOf prov:Entity
          GroundingAct SubClassOf Event
          AcceptanceEvidence SubClassOf prov:Entity
        note: >
          Clark & Schaefer (1989) grounding theory: CommonGround is a GDC,
          GroundingAct is a Process, AcceptanceEvidence is a GDC.
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          GroundingAct SubClassOf contributesToCommonGround some CommonGround
        note: "Every grounding act updates exactly one common ground."
    tbox_requirements:
      - "Class CommonGround SubClassOf prov:Entity, BFO:GDC"
      - "Class GroundingAct SubClassOf Event (Process)"
      - "Class AcceptanceEvidence SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty contributesToCommonGround domain GroundingAct range CommonGround [functional]"
      - "ObjectProperty providesAcceptanceEvidence domain GroundingAct range AcceptanceEvidence"
    abox_requirements:
      - "CommonGround, GroundingAct, and AcceptanceEvidence individuals"

  - cq_id: CQ-098
    natural_language: "Which clarifications were issued before commitment was established?"
    priority: should_have
    module: pao-conversation
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "ClarificationRequest SubClassOf prov:Entity"
        note: "ClarificationRequest is a GDC (BFO:0000031) — a request to resolve ambiguity."
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ClarificationRequest SubClassOf clarifiesTurn some Turn"
        note: "Every clarification request targets exactly one turn."
    tbox_requirements:
      - "Class ClarificationRequest SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty clarifiesTurn domain ClarificationRequest range Turn [functional]"
    abox_requirements:
      - "ClarificationRequest individuals linked to turns"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 14: Model Identity (pao-model) — v0.7.0
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-099
    natural_language: "Which foundation model was used for a given turn?"
    priority: must_have
    module: pao-model
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          Turn SubClassOf producedByModelInvocation some ModelInvocation
          ModelInvocation SubClassOf invokedOnDeployment some ModelDeployment
          ModelDeployment SubClassOf inverse(deployedAs) some FoundationModel
        note: "Three-hop chain from Turn to FoundationModel via ModelInvocation and ModelDeployment."
      - pattern: "Inverse Pair"
        axiom_sketch: "InversePair(modelInvocationForTurn, producedByModelInvocation)"
        note: "Bidirectional navigation between Turn and ModelInvocation."
    tbox_requirements:
      - "Class ModelInvocation SubClassOf prov:Activity"
      - "Class ModelDeployment SubClassOf prov:Entity"
      - "Class FoundationModel SubClassOf prov:Entity"
      - "ObjectProperty producedByModelInvocation domain Turn range ModelInvocation"
      - "ObjectProperty modelInvocationForTurn domain ModelInvocation range Turn (inverse of producedByModelInvocation)"
      - "ObjectProperty invokedOnDeployment domain ModelInvocation range ModelDeployment [functional]"
      - "ObjectProperty deployedAs domain FoundationModel range ModelDeployment"
    abox_requirements:
      - "FoundationModel, ModelDeployment, ModelInvocation individuals linked to turns"

  - cq_id: CQ-100
    natural_language: "What model deployments exist for a foundation model?"
    priority: must_have
    module: pao-model
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "FoundationModel SubClassOf deployedAs some ModelDeployment"
        note: "Every foundation model has at least one deployment."
    tbox_requirements:
      - "ObjectProperty deployedAs domain FoundationModel range ModelDeployment"
    abox_requirements:
      - "FoundationModel individuals with at least one ModelDeployment"

  - cq_id: CQ-101
    natural_language: "Which provider hosts a given model?"
    priority: must_have
    module: pao-model
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "FoundationModel SubClassOf hasProvider some ModelProvider"
        note: "Every foundation model is hosted by exactly one provider."
      - pattern: "Functional Property"
        axiom_sketch: "hasProvider is functional"
        note: "A foundation model has at most one provider (single-valued)."
    tbox_requirements:
      - "Class ModelProvider SubClassOf prov:Agent"
      - "ObjectProperty hasProvider domain FoundationModel range ModelProvider [functional]"
    abox_requirements:
      - "ModelProvider individuals linked to FoundationModel individuals"

  - cq_id: CQ-102
    natural_language: "What generation config was used for a model invocation?"
    priority: must_have
    module: pao-model
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ModelInvocation SubClassOf hasGenerationConfig some GenerationConfiguration"
        note: "Every model invocation uses exactly one generation configuration."
      - pattern: "Functional Property"
        axiom_sketch: "hasGenerationConfig is functional"
        note: "A model invocation has at most one generation configuration (single-valued)."
    tbox_requirements:
      - "Class GenerationConfiguration SubClassOf prov:Entity"
      - "ObjectProperty hasGenerationConfig domain ModelInvocation range GenerationConfiguration [functional]"
    abox_requirements:
      - "GenerationConfiguration individuals linked to ModelInvocation individuals"

  - cq_id: CQ-103
    natural_language: "Which model does a given AI agent use?"
    priority: must_have
    module: pao-model
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "AIAgent SubClassOf usesModel some FoundationModel"
        note: "Every AI agent uses at least one foundation model."
    tbox_requirements:
      - "ObjectProperty usesModel domain AIAgent range FoundationModel"
    abox_requirements:
      - "AIAgent individuals linked to FoundationModel individuals"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 15: Observability (pao-observability) — v0.7.0
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-104
    natural_language: "What metric observations were recorded for a given entity?"
    priority: should_have
    module: pao-observability
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          MetricObservation SubClassOf observesMetric some OperationalMetric
          MetricObservation SubClassOf observedOnEntity some owl:Thing
        note: "Every metric observation targets a metric and an observed entity."
    tbox_requirements:
      - "Class MetricObservation SubClassOf prov:Entity"
      - "Class OperationalMetric SubClassOf prov:Entity"
      - "ObjectProperty observesMetric domain MetricObservation range OperationalMetric [functional]"
      - "ObjectProperty observedOnEntity domain MetricObservation range owl:Thing"
    abox_requirements:
      - "MetricObservation individuals linked to OperationalMetric and observed entities"

  - cq_id: CQ-105
    natural_language: "What operational metrics are defined in the system?"
    priority: should_have
    module: pao-observability
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "OperationalMetric SubClassOf prov:Entity"
        note: "OperationalMetric is a GDC (BFO:0000031) — a named measurable quantity."
      - pattern: "Data Property"
        axiom_sketch: "hasMetricName: OperationalMetric -> xsd:string (functional)"
        note: "Every operational metric has exactly one human-readable name."
    tbox_requirements:
      - "Class OperationalMetric SubClassOf prov:Entity, BFO:GDC"
      - "DatatypeProperty hasMetricName domain OperationalMetric range xsd:string [functional]"
    abox_requirements:
      - "OperationalMetric individuals with hasMetricName values"

  - cq_id: CQ-106
    natural_language: "What reliability incidents occurred for a service?"
    priority: should_have
    module: pao-observability
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ReliabilityIncident SubClassOf incidentForEntity some owl:Thing"
        note: "Every reliability incident is associated with an affected entity (e.g., a service or agent)."
    tbox_requirements:
      - "Class ReliabilityIncident SubClassOf Event"
      - "ObjectProperty incidentForEntity domain ReliabilityIncident range owl:Thing"
    abox_requirements:
      - "ReliabilityIncident individuals linked to service entities"

  - cq_id: CQ-107
    natural_language: "Is a reliability incident linked to a recovery event?"
    priority: should_have
    module: pao-observability
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ReliabilityIncident SubClassOf linkedToRecovery some ErrorRecoveryEvent"
        note: >
          Not all incidents trigger recovery. This restriction is NOT universal —
          consider making this a SHACL shape rather than OWL restriction. The
          existential here expresses a modeling capability, not a hard constraint.
    tbox_requirements:
      - "ObjectProperty linkedToRecovery domain ReliabilityIncident range ErrorRecoveryEvent"
      - "SHACL shape recommended instead of OWL existential (optional link)"
    abox_requirements:
      - "ReliabilityIncident individuals, some with and some without linked ErrorRecoveryEvent"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 16: Failure Taxonomy (pao-recovery) — v0.7.0
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-108
    natural_language: "What failure type caused a given error recovery event?"
    priority: should_have
    module: pao-recovery
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "ErrorRecoveryEvent SubClassOf hasFailureType some FailureType"
        note: "Every error recovery event has at least one associated failure type."
      - pattern: "8. Value Partition"
        axiom_sketch: |
          FailureType SubClassOf Status
          owl:oneOf(Timeout, AuthenticationFailure, RateLimited, DependencyFailure, ConfigurationError, NetworkError)
        note: "ODP-6: Enumerated failure types as named individuals."
    tbox_requirements:
      - "Class FailureType SubClassOf Status (Value Partition)"
      - "Enumeration: owl:oneOf(Timeout, AuthenticationFailure, RateLimited, DependencyFailure, ConfigurationError, NetworkError)"
      - "ObjectProperty hasFailureType domain ErrorRecoveryEvent range FailureType [functional]"
    abox_requirements:
      - "FailureType individuals: Timeout, AuthenticationFailure, RateLimited, DependencyFailure, ConfigurationError, NetworkError"
      - "ErrorRecoveryEvent individuals linked to FailureType individuals"

  - cq_id: CQ-109
    natural_language: "How many recovery events of each failure type occurred?"
    priority: should_have
    module: pao-recovery
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "No additional axioms beyond CQ-108. The SPARQL GROUP BY handles counting."
        note: "Aggregation is a query concern, not an ontological one. CQ-108 axioms suffice."
    tbox_requirements:
      - "No additional TBox requirements — reuses CQ-108 axioms"
    abox_requirements:
      - "Multiple ErrorRecoveryEvent individuals with varied FailureType values for aggregation testing"

  # ═══════════════════════════════════════════════════════════════════════
  # MODULE 17: BDI Completion (pao-planning) — v0.7.0
  # ═══════════════════════════════════════════════════════════════════════

  - cq_id: CQ-110
    natural_language: "What beliefs does an agent hold?"
    priority: should_have
    module: pao-planning
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "Belief SubClassOf prov:Entity"
        note: "Belief is a GDC (BFO:0000031) — a propositional attitude held by an agent."
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Agent SubClassOf heldBelief some Belief"
        note: "Links agents to their beliefs via heldBelief property."
    tbox_requirements:
      - "Class Belief SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty heldBelief domain Agent range Belief"
    abox_requirements:
      - "Belief individuals linked to Agent individuals"

  - cq_id: CQ-111
    natural_language: "What desires does an agent have?"
    priority: should_have
    module: pao-planning
    axiom_patterns:
      - pattern: "1. Simple SubClassOf"
        axiom_sketch: "Desire SubClassOf prov:Entity"
        note: "Desire is a GDC (BFO:0000031) — a motivational attitude held by an agent."
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Agent SubClassOf holdsDesire some Desire"
        note: "Links agents to their desires via holdsDesire property."
    tbox_requirements:
      - "Class Desire SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty holdsDesire domain Agent range Desire"
    abox_requirements:
      - "Desire individuals linked to Agent individuals"

  - cq_id: CQ-112
    natural_language: "What beliefs and desires were considered in a deliberation?"
    priority: should_have
    module: pao-planning
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: |
          Deliberation SubClassOf considersBelief some Belief
          Deliberation SubClassOf considersDesire some Desire
          Deliberation SubClassOf producesIntention some Intention
        note: "A deliberation considers beliefs and desires and produces at least one intention."
    tbox_requirements:
      - "Class Deliberation SubClassOf prov:Activity"
      - "ObjectProperty considersBelief domain Deliberation range Belief"
      - "ObjectProperty considersDesire domain Deliberation range Desire"
      - "ObjectProperty producesIntention domain Deliberation range Intention"
    abox_requirements:
      - "Deliberation individuals linked to Belief, Desire, and Intention individuals"

  - cq_id: CQ-113
    natural_language: "What justification supports a given intention?"
    priority: should_have
    module: pao-planning
    axiom_patterns:
      - pattern: "2. Existential Restriction"
        axiom_sketch: "Justification SubClassOf justifiesIntention some Intention"
        note: "Every justification targets at least one intention."
    tbox_requirements:
      - "Class Justification SubClassOf prov:Entity, BFO:GDC"
      - "ObjectProperty justifiesIntention domain Justification range Intention"
    abox_requirements:
      - "Justification individuals linked to Intention individuals"

# ═══════════════════════════════════════════════════════════════════════
# DESIGN NOTES (v0.5.0 review remediation)
# ═══════════════════════════════════════════════════════════════════════
#
# DN-06: Agent hasIntegration cardinality decision
#   Status: resolved
#   Decision: Existential restriction moved from Agent to AIAgent. Not all
#   agents (HumanUser, Organization) necessarily have integrations. SHACL
#   enforces IntegrationShape constraints on Integration instances.
#
# DN-07: Session/Message channel optionality
#   Status: resolved
#   Decision: viaChannel and sentViaChannel are optional (min 0 per
#   property-design). OWL existential restrictions removed; SHACL caps
#   maxCount 1 when present. A session may not have a channel if the
#   channel concept doesn't apply (e.g., internal system sessions).
#
# DN-08: CQ-076 reclassification
#   Status: resolved
#   Decision: Changed from constraint (zero_rows) to enumerative (non_empty).
#   The query finds integrations in error status — useful for monitoring.
#   ABox includes an error integration for test coverage.
#
# DN-09: Runtime lifecycle scope
#   Status: deferred (v0.6+)
#   Note: Integration status history, channel switching mechanics, and
#   lifecycle governance attachment points are explicitly out of scope
#   for v0.5.0. StatusTransition (v0.3.0) provides the pattern for
#   adding IntegrationStatusTransition if needed in future versions.

