    required_axioms: []

  # ═══════════════════════════════════════════════════════════════════
  # MODULE 5: Goals, Plans, and Tasks
  # ═══════════════════════════════════════════════════════════════════

  - id: CQ-026
    source_use_case: UC-015
    natural_language: "What goals is an agent currently pursuing?"
    type: enumerative
    priority: must_have
    sample_answer:
      - agent: pao:ClaudeCodeAgent_01
        goal: pao:Goal_001
        description: "Build personal agent ontology"
        status: pao:Active
    derivation_method: direct_lookup
    out_of_scope:
      - "Goal priority ranking"
    sparql: |
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX pao: <https://purl.org/pao/>
      SELECT ?goal ?description ?status WHERE {
        ?goal a pao:Goal ;
              pao:pursuedBy ?agent ;
              rdfs:label ?description ;
              pao:hasStatus ?status .
        FILTER (?status IN (pao:Active, pao:InProgress))
      }
    expected_result: non_empty
    required_classes:
      - Goal
    required_properties:
      - pursuedBy
      - hasStatus
    required_axioms: []

  - id: CQ-027
    source_use_case: UC-015
    natural_language: "What tasks compose a given plan, and what are their dependencies?"
    type: relational
    priority: must_have
    sample_answer:
      - plan: pao:Plan_001
        task: pao:Task_001
        blockedBy: pao:Task_000
        status: pao:Pending
    derivation_method: direct_lookup
    out_of_scope:
      - "Scheduling and resource allocation"
    sparql: |
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX pao: <https://purl.org/pao/>
      SELECT ?task ?label ?status ?blockedBy WHERE {
        ?task pao:partOfPlan ?plan ;
              rdfs:label ?label ;
              pao:hasStatus ?status .
        OPTIONAL { ?task pao:blockedBy ?blockedBy . }
      }
    expected_result: non_empty
    required_classes:
      - Plan
      - Task
    required_properties:
      - partOfPlan
      - hasStatus
      - blockedBy
    required_axioms: []

  - id: CQ-028
    source_use_case: UC-015
    natural_language: "What plan was created to achieve a given goal?"
