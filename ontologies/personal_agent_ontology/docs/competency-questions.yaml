        policy: pao:RetentionPolicy_30Day
        expiry: "30"
    derivation_method: inference
    out_of_scope:
      - "Automatic deletion mechanics"
      - "Uses approximate day arithmetic (YEAR*365+MONTH*30+DAY) for rdflib compatibility; production SPARQL endpoints support standard xsd:duration arithmetic."
    sparql: |
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
