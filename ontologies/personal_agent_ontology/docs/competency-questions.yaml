      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX pao: <https://purl.org/pao/>
      SELECT ?event ?type WHERE {
        ?event rdf:type ?type .
        ?type rdfs:subClassOf* pao:Event .
      }
    expected_result: non_empty
    required_classes:
      - Event
    required_properties: []
    required_axioms: []

  - id: CQ-025
    source_use_case: UC-007
    natural_language: "What events are part of a given episode?"
    type: relational
    priority: must_have
    sample_answer:
      - episode: pao:Episode_001
