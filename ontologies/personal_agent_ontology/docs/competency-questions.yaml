  - id: CQ-039
    source_use_case: UC-017
    natural_language: "Are there any tool invocations that violate their permission policies?"
    type: constraint
    priority: must_have
    sample_answer:
      - "(zero violations expected)"
    derivation_method: inference
    out_of_scope:
      - "Policy violation remediation"
    sparql: |
      PREFIX pao: <https://purl.org/pao/>
      SELECT ?invocation ?tool ?policy WHERE {
        ?invocation a pao:ToolInvocation ;
                    pao:hasComplianceStatus pao:NonCompliant ;
                    pao:invokesTool ?tool .
        ?policy pao:appliesTo ?agent ;
                pao:restrictsToolUse ?tool .
        ?invocation pao:invokedBy ?agent .
      }
    expected_result: zero_rows
    required_classes:
      - ToolInvocation
      - PermissionPolicy
    required_properties:
      - hasComplianceStatus
      - restrictsToolUse
    required_axioms: []

  - id: CQ-040
    source_use_case: UC-010
    natural_language: "Are there any memory items without provenance attribution?"
    type: constraint
    priority: must_have
    sample_answer:
      - "(zero violations expected -- all items must have provenance)"
    derivation_method: inference
    out_of_scope:
      - "Provenance completeness beyond attribution"
    sparql: |
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX pao: <https://purl.org/pao/>
      PREFIX prov: <http://www.w3.org/ns/prov#>
      SELECT ?item WHERE {
        ?item a pao:MemoryItem .
        FILTER NOT EXISTS { ?item prov:wasAttributedTo ?agent . }
      }
    expected_result: zero_rows
    required_classes:
      - MemoryItem
    required_properties: []
    required_axioms:
      - "MemoryItem rdfs:subClassOf prov:Entity"
