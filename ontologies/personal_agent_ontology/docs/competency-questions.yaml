        agent: pao:ClaudeCodeAgent_01
        activity: pao:ConsolidationActivity_001
    derivation_method: direct_lookup
    out_of_scope:
      - "Activity implementation details"
    sparql: |
      PREFIX pao: <https://purl.org/pao/>
      PREFIX prov: <http://www.w3.org/ns/prov#>
      SELECT ?item ?agent ?activity WHERE {
        ?item prov:wasGeneratedBy ?activity .
        ?activity prov:wasAssociatedWith ?agent .
      }
    expected_result: non_empty
    required_classes:
      - MemoryItem
    required_properties: []
    required_axioms:
      - "MemoryItem rdfs:subClassOf prov:Entity"

  - id: CQ-037
    source_use_case: UC-005
    natural_language: "How many tool invocations did a given agent perform in a session?"
    type: quantitative
    priority: should_have
    sample_answer:
      - agent: pao:ClaudeCodeAgent_01
        session: pao:Session_abc123
        count: 15
    derivation_method: aggregation
    out_of_scope:
      - "Tool invocation cost/billing"
    sparql: |
      PREFIX pao: <https://purl.org/pao/>
      SELECT ?agent ?session (COUNT(?invocation) AS ?count) WHERE {
        ?invocation a pao:ToolInvocation ;
                    pao:invokedBy ?agent ;
                    pao:inSession ?session .
      }
      GROUP BY ?agent ?session
    expected_result: non_empty
    required_classes:
      - ToolInvocation
    required_properties:
      - invokedBy
      - inSession
    required_axioms: []

