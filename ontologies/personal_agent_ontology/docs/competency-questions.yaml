    sparql: |
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX pao: <https://purl.org/pao/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?agent ?policy ?policyLabel ?permission WHERE {
        ?policy pao:appliesTo ?agent ;
                rdfs:label ?policyLabel ;
                pao:grantsPermission ?permission .
      }
    expected_result: non_empty
    required_classes:
      - PermissionPolicy
    required_properties:
      - appliesTo
      - grantsPermission
    required_axioms: []

