  - id: CQ-052
    source_use_case: UC-006
    natural_language: "What items were dropped during a compaction event?"
    type: enumerative
    priority: should_have
    sample_answer:
      - compaction: pao:Compaction_001
        item: pao:Turn_042
    derivation_method: direct_lookup
    out_of_scope:
      - "Compaction algorithm internals"
    sparql: |
      PREFIX pao: <https://purl.org/pao/>
      PREFIX prov: <http://www.w3.org/ns/prov#>
      SELECT ?compaction ?item WHERE {
        ?compaction a pao:CompactionEvent .
        ?item prov:wasInvalidatedBy ?compaction .
      }
    expected_result: non_empty
    required_classes:
      - CompactionEvent
    required_properties: []
    required_axioms:
      - "CompactionEvent rdfs:subClassOf prov:Activity"

  - id: CQ-053
    source_use_case: UC-006
    natural_language: "What fraction of items were preserved during compaction?"
    type: quantitative
    priority: should_have
    sample_answer:
      - compaction: pao:Compaction_001
        total: 20
        droppedCount: 12
        preservedCount: 8
        fractionPreserved: 0.4
    derivation_method: aggregation
    out_of_scope:
      - "Compaction quality metrics"
    sparql: |
      PREFIX pao: <https://purl.org/pao/>
      PREFIX prov: <http://www.w3.org/ns/prov#>
      SELECT ?compaction ?total ?droppedCount ((?total - ?droppedCount) AS ?preservedCount)
             (IF(?total > 0, ((?total - ?droppedCount) / ?total), 0) AS ?fractionPreserved) WHERE {
        {
          SELECT ?compaction (COUNT(?item) AS ?total) (COUNT(?dropped) AS ?droppedCount) WHERE {
            ?compaction a pao:CompactionEvent ;
                        pao:compactedItem ?item .
            OPTIONAL {
              ?item prov:wasInvalidatedBy ?compaction .
              BIND(?item AS ?dropped)
            }
          }
          GROUP BY ?compaction
        }
      }
    expected_result: non_empty
    required_classes:
      - CompactionEvent
    required_properties:
      - compactedItem
    required_axioms: []

