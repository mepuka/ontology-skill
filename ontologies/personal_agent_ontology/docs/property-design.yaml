# ═══════════════════════════════════════════════════════════════════════
# PROPERTY HIERARCHY SUMMARY
# ═══════════════════════════════════════════════════════════════════════
#
# partOf (transitive)
#   ├── partOfConversation   (Session -> Conversation)
#   ├── partOfSession        (Turn -> Session)
#   └── partOfPlan           (Task -> Plan)
#
# hasPart (transitive, inverse of partOf)
#   └── hasTask              (Plan -> Task)
#
# hasParticipant
#   └── performedBy          (Action -> Agent)
#       └── invokedBy        (ToolInvocation -> Agent)
#
# hasStatus
#   ├── hasComplianceStatus  (ToolInvocation -> ComplianceStatus)
#   ├── hasIntegrationStatus (Integration -> IntegrationStatus)
#   ├── hasConnectionStatus  (ServiceConnection -> ConnectionStatus)
#   └── hasScheduleStatus    (Schedule -> ScheduleStatus)
#
# belongsTo <-> hasMember (inverse pair)
#
# prov:used
#   └── compactedItem          (CompactionEvent -> prov:Entity)
#
# continuedFrom <-> continuedBy (inverse pair)
# previousTransition <-> nextTransition (inverse pair)
#
# Note: recordedInEpisode is NOT a sub-property of partOf (DD-06)

# ═══════════════════════════════════════════════════════════════════════
# SHACL CONSTRAINT NOTES (to be formalized in shapes/)
# ═══════════════════════════════════════════════════════════════════════
#
# The following constraints should be implemented as SHACL shapes rather
# than OWL domain/range axioms to avoid unintended inference:
#
# SubAgent:
#   - sh:class Agent on spawnedBy (exactly 1)
#   - sh:minCount 1 on spawnedBy
#
# AIAgent:
#   - sh:minCount 1 on hasAvailableTool
#
# Conversation:
#   - sh:minCount 1 on hasParticipant
#
# Session:
#   - sh:class Conversation on partOfConversation (exactly 1)
#   - sh:class SessionStatus on hasStatus (exactly 1)
#
# Turn:
#   - sh:class Session on partOfSession (exactly 1)
#   - sh:minCount 1 on hasTurnIndex
#
# ToolInvocation:
#   - sh:class ToolDefinition on invokesTool (exactly 1)
#   - sh:class Agent on invokedBy (exactly 1)
#
# Action:
#   - sh:class Agent on performedBy (exactly 1)
#
# Claim:
#   - sh:minInclusive 0.0, sh:maxInclusive 1.0 on hasConfidence
#   - sh:minCount 1 on hasContent
#
# Task:
#   - sh:class Plan on partOfPlan (exactly 1)
#   - sh:class TaskStatus on hasStatus (exactly 1)
#
# Plan:
#   - sh:minCount 1 on achievesGoal
#
# MemoryOperation:
#   - sh:minCount 1 on operatesOn
#
# ErasureEvent:
#   - sh:class Agent on requestedBy (exactly 1)
#
# CommunicationChannel:
#   - sh:class ChannelType on hasChannelType (exactly 1)
#
# Integration:
#   - sh:class IntegrationStatus on hasIntegrationStatus (max 1)
#   - sh:minCount 1 on providesTool
#
# Schedule:
#   - sh:class RecurrencePattern on hasRecurrencePattern (exactly 1)
#   - sh:class ScheduleStatus on hasScheduleStatus (exactly 1)
#   - sh:class AIAgent on ownedByAgent (exactly 1)
#   - sh:minCount 1 on schedulesAction
#
# ScheduledExecution:
#   - sh:class Schedule on executionOf (exactly 1)
#   - sh:class ExecutionOutcome on hasExecutionOutcome (max 1)

