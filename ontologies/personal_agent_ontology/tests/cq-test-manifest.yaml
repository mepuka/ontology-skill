# Personal Agent Ontology -- CQ Test Manifest (TDOD-style)
# Framework: Test-Driven Ontology Development (Keet & Lawrynowicz, 2016)
# Runner: ROBOT verify (--queries flag) or custom SPARQL test harness
# CQ-022 skipped (could_have priority)

ontology:
  name: Personal Agent Ontology
  prefix: pao
  namespace: "https://purl.org/pao/"

# --- Module 1: Identity & Actors ---

cq_tests:
  - id: cq-001
    file: cq-001.sparql
    cq: CQ-001
    module: identity_actors
    question: "What agents exist in the system and what type is each?"
    type: SELECT
    expected: non_empty
    requires_abox: true

  - id: cq-002
    file: cq-002.sparql
    cq: CQ-002
    module: identity_actors
    question: "What tools are available to a given agent?"
    type: SELECT
    expected: non_empty
