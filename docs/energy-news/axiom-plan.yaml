# Energy News Ontology — Axiom Plan
# Produced by: ontology-conceptualizer (Phase 3)
# Updated: Codex review remediation — SKOS conversion, naming fixes, AuthorAccount
# Maps each CQ to the OWL axiom patterns required to answer it.

cq_axiom_mappings:
  # --- Must Have CQs ---

  - cq: CQ-001
    question: "What energy topics exist in the ontology?"
    axiom_patterns:
      - pattern: "Individual Assertions (rdf:type)"
        description: >
          All energy topic individuals are declared as instances of
          enews:EnergyTopic (and skos:Concept). The SPARQL query uses
          rdf:type to enumerate all topic individuals.
        axioms:
          - "enews:Solar rdf:type enews:EnergyTopic"
          - "enews:Renewable rdf:type enews:EnergyTopic"
          - "(... all ~55 topic individuals)"
      - pattern: "Annotations"
        description: >
          Every topic individual has rdfs:label and skos:definition annotations
          so the SPARQL query can return human-readable results.

  - cq: CQ-002
    question: "What subtopics exist under a given energy topic?"
    axiom_patterns:
      - pattern: "SKOS Broader/Narrower"
        description: >
          skos:broader assertions create the parent-child hierarchy among
          topic individuals. SPARQL queries direct skos:broader for subtopics.
        axioms:
          - "enews:Solar skos:broader enews:Renewable"
          - "enews:Wind skos:broader enews:Renewable"
          - "enews:Coal skos:broader enews:Fossil"
      - pattern: "owl:differentFrom (optional)"
        description: >
          Sibling topics under the same broader concept may be declared
          owl:differentFrom to ensure they are distinct individuals. This
          replaces the OWL DisjointClasses pattern that was used when
          topics were modeled as classes. SKOS concepts cannot use
          owl:disjointWith, but owl:differentFrom on individuals serves
          the same purpose for SKOS integrity.
        axioms:
          - "owl:AllDifferent(enews:Solar, enews:Wind, enews:Hydro, enews:Geothermal)"
          - "owl:AllDifferent(enews:Coal, enews:NaturalGas, enews:Oil)"
          - "(... all sibling groups)"

  - cq: CQ-003
    question: "Which articles cover a given energy topic?"
    axiom_patterns:
      - pattern: "Existential Restriction (#2)"
        description: >
          Articles must cover at least one topic.
        axioms:
          - "Article SubClassOf coversTopic some EnergyTopic"
      - pattern: "Simple SubClassOf (#1)"
        description: >
          Article is declared as a class with rdfs:label.
      - pattern: "HasKey (#11)"
        description: >
          Article HasKey url — allows deduplication of articles by URL.
        axioms:
          - "HasKey(Article, url)"

  - cq: CQ-004
    question: "Which publication published a given article?"
    axiom_patterns:
      - pattern: "Existential Restriction (#2) — optional"
        description: >
          Not all articles have a known publisher, so this is not a universal
          restriction. publishedBy is functional (at most one publisher).
        axioms:
          - "publishedBy rdf:type owl:FunctionalProperty"
      - pattern: "Simple SubClassOf (#1)"
        description: >
          Publication is declared as a class with rdfs:label.

  - cq: CQ-005
    question: "What energy topics does a given publication cover?"
    axiom_patterns:
      - pattern: "No additional axioms beyond CQ-003 and CQ-004"
        description: >
          This CQ is answered by traversing: Article publishedBy Publication
          and Article coversTopic EnergyTopic. The required axioms are
          already covered by CQ-003 (coversTopic) and CQ-004 (publishedBy).

  - cq: CQ-006
    question: "How many articles has each publication contributed?"
    axiom_patterns:
      - pattern: "No additional axioms beyond CQ-004"
        description: >
          Aggregation query over publishedBy. Requires Article and Publication
          classes with publishedBy property (covered by CQ-004).

  - cq: CQ-007
    question: "Who are the top authors sharing energy news?"
    axiom_patterns:
      - pattern: "Existential Restriction (#2)"
        description: >
          Every post has exactly one author account.
        axioms:
          - "Post SubClassOf postedBy some AuthorAccount"
          - "postedBy rdf:type owl:FunctionalProperty"
      - pattern: "HasKey (#11)"
        description: >
          AuthorAccount HasKey handle — unique identity per Bluesky account.
        axioms:
          - "HasKey(AuthorAccount, handle)"

  - cq: CQ-008
    question: "What energy topics does a given author primarily share about?"
    axiom_patterns:
      - pattern: "No additional axioms beyond CQ-003 and CQ-007"
        description: >
          This CQ traverses Post postedBy AuthorAccount, Post sharesArticle
          Article, Article coversTopic EnergyTopic. Requires sharesArticle
          property (functional, optional).
        axioms:
          - "sharesArticle rdf:type owl:FunctionalProperty"

  - cq: CQ-009
    question: "Which Bluesky feeds exist for energy content?"
    axiom_patterns:
      - pattern: "Simple SubClassOf (#1)"
        description: >
          Feed is declared as a class with rdfs:label. Simple enumeration query.

  - cq: CQ-010
    question: "Is a given energy source classified as renewable or fossil?"
    axiom_patterns:
      - pattern: "SKOS Broader/Narrower"
        description: >
          The topic hierarchy answers this via skos:broader* property path
          inference. enews:Solar skos:broader enews:Renewable, so
          ASK { enews:Solar skos:broader* enews:Renewable } returns true.
      - pattern: "owl:differentFrom"
        description: >
          Renewable and Fossil are distinct individuals (owl:differentFrom) —
          a topic cannot be broader-of both simultaneously in a well-formed
          SKOS scheme.
        axioms:
          - "owl:AllDifferent(enews:Renewable, enews:Fossil, enews:Nuclear, enews:EnergyStorage, enews:Hydrogen, enews:CarbonCapture, ...)"

  # --- Should Have CQs ---

  - cq: CQ-011
    question: "Which organizations are mentioned in energy news?"
    axiom_patterns:
      - pattern: "Simple SubClassOf (#1)"
        description: >
          Organization is declared as a class with rdfs:label. Simple enumeration.

  - cq: CQ-012
    question: "Which energy topics is a given organization associated with?"
    axiom_patterns:
      - pattern: "Object Property Declaration"
        description: >
          Requires mentionsOrganization object property (domain: Article,
          range: Organization). Traverses Article mentionsOrganization
          Organization and Article coversTopic EnergyTopic. The coversTopic
          property is introduced by CQ-003; mentionsOrganization is
          introduced here.

  - cq: CQ-013
    question: "Which countries or regions are covered in energy news?"
    axiom_patterns:
      - pattern: "Simple SubClassOf (#1)"
        description: >
          GeographicEntity is declared as a class with rdfs:label. Simple
          enumeration.
      - pattern: "HasKey (#11)"
        description: >
          GeographicEntity could use a HasKey on a code property (e.g., ISO
          country code) but this is optional for v1.

  - cq: CQ-014
    question: "What energy topics are covered in a given country?"
    axiom_patterns:
      - pattern: "Object Property Declaration"
        description: >
          Requires hasGeographicFocus object property (domain: Article,
          range: GeographicEntity). Traverses Article hasGeographicFocus
          GeographicEntity and Article coversTopic EnergyTopic. The
          coversTopic property is introduced by CQ-003; hasGeographicFocus
          is introduced here.

  - cq: CQ-015
    question: "What type or sector does a given organization belong to?"
    axiom_patterns:
      - pattern: "Object Property Declaration"
        description: >
          Requires hasSector object property (domain: Organization,
          range: EnergyTopic). This provides explicit organization
          sector classification for CQ-015.
        axioms:
          - "Organization SubClassOf hasSector only EnergyTopic (optional local closure)"
          - "hasSector Domain Organization"
          - "hasSector Range EnergyTopic"

  - cq: CQ-016
    question: "How does energy news coverage volume compare across geographic regions?"
    axiom_patterns:
      - pattern: "No additional axioms beyond CQ-013 and CQ-014"
        description: >
          Aggregation query counting articles per GeographicEntity.
          Requires hasGeographicFocus property (covered by CQ-014).

# --- Axiom Pattern Summary ---

patterns_used:
  - id: 1
    name: "Simple SubClassOf"
    count: "~8 axioms (OWL classes only)"
    notes: "Foundation of domain class declarations (Article, Publication, Post, AuthorAccount, Feed, Organization, GeographicEntity, EnergyTopic)"

  - id: 2
    name: "Existential Restriction"
    count: 2
    notes: "Article coversTopic some EnergyTopic; Post postedBy some AuthorAccount"

  - id: 5
    name: "owl:differentFrom / owl:AllDifferent"
    count: "~14 groups"
    notes: "Sibling topic individuals within SKOS hierarchy; top-level domain classes remain owl:disjointWith"

  - id: 11
    name: "HasKey"
    count: 3
    notes: "Article(url), AuthorAccount(handle), Publication(siteDomain)"

  - id: "skos"
    name: "SKOS Broader/Narrower + Individual Assertions"
    count: "~55 rdf:type + ~35 skos:broader assertions"
    notes: "Topic individuals typed as EnergyTopic and skos:Concept; hierarchy via skos:broader"

patterns_not_needed:
  - id: 3
    name: "Universal Restriction"
    reason: "No CQ requires closure axioms"
  - id: 4
    name: "Equivalent Class"
    reason: "No defined classes needed — taxonomy is asserted"
  - id: 6
    name: "Covering Axiom"
    reason: "Topic scheme is not exhaustive — new topics may be added"
  - id: 7
    name: "Qualified Cardinality"
    reason: "No CQ requires exact cardinality"
  - id: 8
    name: "Value Partition"
    reason: "No quality values modeled"
  - id: 9
    name: "N-ary Relation"
    reason: "All relations are binary"
  - id: 12
    name: "Property Chain"
    reason: "SPARQL handles multi-hop traversal; no inferred chains needed"
